<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>나의 여행 지도</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    background: #f4f6f9; color: #1f2937; height: 100vh; height: 100dvh;
    display: flex; flex-direction: column;
  }
  button { font-family: inherit; }
  input { font-family: inherit; }
  .icon { width: 1.15em; height: 1.15em; vertical-align: -0.2em; flex-shrink: 0; }

  /* ---- 랜딩 ---- */
  #landing { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
  #landing .card {
    background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; padding: 32px 28px;
    width: 100%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,.05);
  }
  #landing h1 { font-size: 22px; text-align: center; }
  #landing .desc { font-size: 13px; color: #6b7280; text-align: center; margin: 6px 0 22px; }
  #landing h3 { font-size: 13px; color: #6b7280; margin: 16px 0 8px; }
  #landing input {
    width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #d1d5db;
    border-radius: 8px; margin-bottom: 8px;
  }
  #landing .primary {
    width: 100%; padding: 10px; font-size: 14px; font-weight: 600; border: none;
    border-radius: 8px; background: #3b9c6e; color: #fff; cursor: pointer;
  }
  #landing .primary:hover { background: #2f7d58; }
  .err { font-size: 12.5px; color: #b91c1c; margin-top: 6px; min-height: 16px; }
  #myRooms a {
    display: block; padding: 9px 12px; border: 1px solid #e5e7eb; border-radius: 8px;
    margin-bottom: 6px; font-size: 14px; color: #1f2937; text-decoration: none;
  }
  #myRooms a:hover { background: #f3f4f6; }
  #landing .tip { font-size: 12px; color: #9ca3af; margin-top: 16px; text-align: center; }

  /* ---- 앱 ---- */
  #app { flex: 1; display: none; flex-direction: column; min-height: 0; }
  header {
    padding: 10px 16px; background: #fff; border-bottom: 1px solid #e5e7eb;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  header h1 { font-size: 17px; }
  #roomName { font-size: 15px; font-weight: 700; color: #1f2937; }
  header .hbtn {
    font-size: 12px; padding: 5px 11px; border-radius: 999px; cursor: pointer;
    border: 1px solid #e2e8f0; background: #fff; color: #475569;
  }
  header .hbtn:hover { background: #f1f5f9; border-color: #cbd5e1; }
  #searchWrap { position: relative; margin-left: 8px; }
  #searchWrap .search-ic { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; pointer-events: none; }
  #searchInput {
    width: 190px; font-size: 13px; padding: 6px 10px 6px 28px; border: 1px solid #e2e8f0;
    border-radius: 999px; color: #374151; background: #fff;
  }
  #searchInput:focus { outline: none; border-color: #3b9c6e; width: 220px; }
  #searchResults {
    position: absolute; left: 0; top: calc(100% + 5px); width: 260px; max-height: 320px;
    overflow-y: auto; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px;
    box-shadow: 0 6px 20px rgba(0,0,0,.1); z-index: 20; display: none; padding: 4px;
  }
  #searchResults.show { display: block; }
  .sr-item {
    display: flex; align-items: center; gap: 8px; padding: 7px 9px; border-radius: 7px;
    cursor: pointer; font-size: 13px;
  }
  .sr-item.active, .sr-item:hover { background: #f1f7f3; }
  .sr-item img { width: 20px; height: 20px; object-fit: contain; flex-shrink: 0; }
  .sr-item .sr-prov { color: #9ca3af; font-size: 11.5px; margin-left: auto; }
  .sr-item .sr-visited { color: #3b9c6e; font-size: 11px; }
  #searchResults .sr-empty { padding: 10px; text-align: center; color: #9ca3af; font-size: 12.5px; }
  #syncBadge { font-size: 12px; padding: 3px 10px; border-radius: 999px; margin-left: auto; }
  #syncBadge::before {
    content: ""; display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: currentColor; margin-right: 6px; vertical-align: 1px;
  }
  #syncBadge.on { background: #dcf5e8; color: #1a7a4d; }
  #syncBadge.off { background: #fee2e2; color: #b91c1c; }
  .layout { flex: 1; display: flex; min-height: 0; }
  .map-wrap {
    flex: 1; position: relative; overflow: hidden; touch-action: none;
    background: linear-gradient(180deg, #eaf2fa 0%, #f4f6f9 100%);
  }
  #map { width: 100%; height: 100%; display: block; cursor: grab; }
  #map.dragging { cursor: grabbing; }
  #municipalities path { transition: fill .15s; cursor: pointer; }
  #municipalities path:hover { fill: #e3f2e9; }
  #municipalities path.visited { fill: #b7e4c7; }
  #municipalities path.visited:hover { fill: #a4dcb8; }
  #municipalities path.selected { stroke: #2d6a4f; stroke-width: 1.5; }
  #muniLabels text.on-visited { fill: #1b4332; stroke: #ffffff; }
  .zoom-btns { position: absolute; right: 14px; bottom: 14px; display: flex; flex-direction: column; gap: 6px; }
  .zoom-btns button {
    width: 38px; height: 38px; border: 1px solid #d1d5db; background: #fff; border-radius: 8px;
    font-size: 18px; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  .zoom-btns button:hover { background: #f3f4f6; }
  aside {
    width: 310px; background: #fff; border-left: 1px solid #e5e7eb;
    padding: 16px; overflow-y: auto; flex-shrink: 0;
  }
  .big-stat { text-align: center; }
  .big-stat .pct { font-size: 40px; font-weight: 700; color: #3b9c6e; }
  .big-stat .cnt { font-size: 13px; color: #6b7280; margin-top: 2px; }
  .total-bar { height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; margin: 10px 0 14px; }
  .total-bar > div { height: 100%; background: #3b9c6e; border-radius: 4px; width: 0; transition: width .3s; }
  h2 { font-size: 12.5px; color: #6b7280; font-weight: 600; margin: 14px 0 8px; }

  #regionPanel { border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; background: #fafbfc; }
  #regionPanel .hint { font-size: 12.5px; color: #9ca3af; text-align: center; padding: 6px 0; }
  #rpHead { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  #rpEmblem {
    width: 34px; height: 34px; object-fit: contain; display: none;
    background: #fff; border: 1px solid #eef0f3; border-radius: 8px; padding: 2px;
  }
  #rpName { font-size: 15px; font-weight: 700; }
  #rpProv { font-size: 12px; color: #6b7280; }
  #rpToggle {
    margin-left: auto; font-size: 12px; padding: 5px 10px; border-radius: 999px; cursor: pointer;
    border: 1px solid #d1d5db; background: #fff; color: #374151; white-space: nowrap;
  }
  #rpToggle.v { background: #3b9c6e; border-color: #3b9c6e; color: #fff; }
  #photoGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 8px; }
  #photoGrid .ph { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; cursor: pointer; }
  #photoGrid img { width: 100%; height: 100%; object-fit: cover; display: block; }
  #photoGrid .del {
    position: absolute; top: 3px; right: 3px; width: 20px; height: 20px; border-radius: 50%;
    background: rgba(0,0,0,.55); color: #fff; border: none; font-size: 12px; line-height: 1;
    cursor: pointer; display: none;
  }
  #photoGrid .ph:hover .del { display: block; }
  .upload-btn {
    display: block; text-align: center; font-size: 13px; padding: 8px; border-radius: 8px;
    border: 1px dashed #9ca3af; color: #4b5563; cursor: pointer; background: #fff;
  }
  .upload-btn:hover { background: #f3f4f6; }
  #uploadMsg { font-size: 11.5px; color: #9ca3af; text-align: center; margin-top: 6px; }
  .note-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .note-row input[type=date], .note-row textarea {
    width: 100%; font-size: 13px; border: 1px solid #e2e8f0; border-radius: 8px;
    padding: 7px 9px; color: #374151; background: #fff;
  }
  .note-row textarea { resize: vertical; line-height: 1.4; }
  .note-row input[type=date]:focus, .note-row textarea:focus {
    outline: none; border-color: #3b9c6e;
  }
  /* 여행 앨범 (기록 탭) */
  #memoryFeed:empty::after {
    content: "아직 남긴 기록이 없어요.\A지역을 눌러 사진·메모를 남겨보세요.";
    white-space: pre; display: block; text-align: center; color: #9ca3af;
    font-size: 12.5px; padding: 14px 0; line-height: 1.6;
  }
  .mem-card {
    border: 1px solid #eef0f3; border-radius: 12px; padding: 11px 12px; margin-bottom: 10px;
    background: #fafbfc; cursor: pointer; transition: background .12s, border-color .12s;
  }
  .mem-card:hover { background: #f1f7f3; border-color: #cde6d8; }
  .mem-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .mem-head img { width: 26px; height: 26px; object-fit: contain; }
  .mem-title { font-size: 13.5px; font-weight: 700; color: #1f2937; }
  .mem-prov { font-size: 11px; color: #9ca3af; }
  .mem-date { margin-left: auto; font-size: 11.5px; color: #6b7280; }
  .mem-memo { font-size: 12.5px; color: #4b5563; line-height: 1.5; margin-bottom: 8px; white-space: pre-wrap; }
  .mem-photos { display: grid; grid-template-columns: repeat(auto-fill, minmax(58px, 1fr)); gap: 5px; }
  .mem-photos img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 7px; cursor: pointer; }
  /* 첫 방문 안내 */
  #firstHint {
    position: absolute; left: 50%; top: 18px; transform: translateX(-50%); z-index: 6;
    background: rgba(31,41,55,.92); color: #fff; font-size: 13px; line-height: 1.5;
    padding: 10px 16px; border-radius: 12px; text-align: center; max-width: 82%;
    box-shadow: 0 4px 16px rgba(0,0,0,.18); display: none;
  }
  #firstHint b { color: #8fe3b8; }
  #firstHint .x {
    display: inline-block; margin-top: 6px; font-size: 11.5px; color: #cbd5e1;
    text-decoration: underline; cursor: pointer;
  }

  .prov-row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; padding: 2.5px 0; }
  .prov-row .name { width: 34px; color: #374151; }
  .prov-row .bar { flex: 1; height: 6px; background: #eef0f3; border-radius: 3px; overflow: hidden; }
  .prov-row .bar > div { height: 100%; background: #7fc9a4; border-radius: 3px; }
  .prov-row.done .bar > div { background: #3b9c6e; }
  .prov-row .num { width: 46px; text-align: right; color: #9ca3af; font-variant-numeric: tabular-nums; }
  .btns { display: flex; gap: 8px; margin-top: 16px; }
  .btns button {
    flex: 1; padding: 8px 0; font-size: 13px; border-radius: 8px; cursor: pointer;
    border: 1px solid #e2e8f0; background: #fff; color: #475569;
  }
  .btns button:hover { background: #f1f5f9; border-color: #cbd5e1; }
  .btns #resetBtn { color: #b91c1c; border-color: #fecaca; }
  .btns #resetBtn:hover { background: #fef2f2; }
  #tooltip {
    position: fixed; pointer-events: none; background: rgba(31,41,55,.92); color: #fff;
    font-size: 12.5px; padding: 5px 10px; border-radius: 6px; display: none; z-index: 10;
    white-space: nowrap;
  }
  #tooltip .v { color: #8fe3b8; }
  #lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,.85); display: none;
    align-items: center; justify-content: center; z-index: 20; cursor: zoom-out;
  }
  #lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 6px; }

  /* ---- 암호 입력 모달 ---- */
  #joinModal {
    position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none;
    align-items: center; justify-content: center; z-index: 30;
  }
  #joinModal .card {
    background: #fff; border-radius: 14px; padding: 26px 24px; width: 90%; max-width: 340px;
  }
  #joinModal h3 { font-size: 16px; margin-bottom: 4px; }
  #joinModal p { font-size: 12.5px; color: #6b7280; margin-bottom: 14px; }
  #joinModal input {
    width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #d1d5db;
    border-radius: 8px; margin-bottom: 8px;
  }
  #joinModal button {
    width: 100%; padding: 10px; font-size: 14px; font-weight: 600; border: none;
    border-radius: 8px; background: #3b9c6e; color: #fff; cursor: pointer;
  }

  /* ---- 모바일: 하단 탭 + 바텀시트 ---- */
  #tabbar { display: none; }
  #mapStatPill { display: none; }
  #rpClose { display: none; }
  @media (max-width: 720px) {
    aside { display: none; }
    /* 모바일 헤더: 검색을 둘째 줄 전체 폭으로 */
    #roomName { order: 1; }
    #inviteBtn { order: 2; }
    #saveBtn { order: 3; }
    #leaveBtn { order: 4; }
    #syncBadge { order: 5; }
    #searchWrap { order: 6; margin-left: 0; width: 100%; flex-basis: 100%; }
    #searchInput, #searchInput:focus { width: 100%; }
    #searchResults { width: 100%; }
    header .hbtn { font-size: 11.5px; padding: 4px 9px; }
    body.tab-stats .map-wrap { display: none; }
    body.tab-stats aside {
      display: block; width: 100%; max-height: none; flex: 1; border-left: none;
    }
    .big-stat .pct { font-size: 34px; }
    #tabbar { display: flex; background: #fff; border-top: 1px solid #e5e7eb; flex-shrink: 0; }
    #tabbar button {
      flex: 1; padding: 8px 0; padding-bottom: max(8px, env(safe-area-inset-bottom));
      font-size: 11.5px; border: none; background: none; color: #9ca3af; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    #tabbar button .icon { width: 22px; height: 22px; }
    #tabbar button.active { color: #3b9c6e; font-weight: 600; }
    #mapStatPill {
      display: block; position: absolute; top: 10px; left: 10px; z-index: 5;
      background: rgba(255,255,255,.93); border: 1px solid #e5e7eb; border-radius: 999px;
      padding: 6px 13px; font-size: 12.5px; color: #374151; cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    #mapStatPill b { color: #3b9c6e; }
    /* 지역 상세 패널 = 바텀시트 */
    body.is-mobile #regionPanel {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 15;
      background: #fff; border: none; border-top: 1px solid #e5e7eb;
      border-radius: 16px 16px 0 0; box-shadow: 0 -6px 24px rgba(0,0,0,.15);
      max-height: 62%; overflow-y: auto;
      padding: 14px 16px; padding-bottom: max(14px, env(safe-area-inset-bottom));
      transform: translateY(110%); transition: transform .25s;
    }
    body.is-mobile #regionPanel.open { transform: translateY(0); }
    body.is-mobile #regionPanel .hint { display: none; }
    #rpClose {
      display: block; margin-left: 8px; width: 28px; height: 28px; border-radius: 50%;
      border: none; background: #f3f4f6; color: #6b7280; font-size: 13px; cursor: pointer;
      flex-shrink: 0;
    }
  }
</style>
</head>
<body>

<div id="landing">
  <div class="card">
    <h1><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#3b9c6e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4 3.5 6v14L9 18l6 2 5.5-2V4L15 6 9 4Z"/><path d="M9 4v14"/><path d="M15 6v14"/></svg> 나의 여행 지도</h1>
    <div class="desc">가본 시·군·구를 함께 색칠하고 사진을 남겨요</div>
    <h3>새 지도 만들기</h3>
    <input id="newName" placeholder="지도 이름 (예: 우리 가족 여행지도)" maxlength="40">
    <input id="newPw" type="password" placeholder="공유 암호 (4자 이상)">
    <button class="primary" id="createBtn">지도 만들기</button>
    <div class="err" id="createErr"></div>
    <div id="myRoomsWrap" style="display:none">
      <h3>내 지도</h3>
      <div id="myRooms"></div>
    </div>
    <div class="tip">초대받았다면 받은 링크로 접속한 뒤 암호를 입력하세요.</div>
  </div>
</div>

<div id="app">
  <header>
    <h1><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#3b9c6e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4 3.5 6v14L9 18l6 2 5.5-2V4L15 6 9 4Z"/><path d="M9 4v14"/><path d="M15 6v14"/></svg></h1>
    <span id="roomName"></span>
    <div id="searchWrap">
      <svg class="icon search-ic" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
      <input id="searchInput" type="text" placeholder="지역 검색 (예: 경주)" autocomplete="off">
      <div id="searchResults"></div>
    </div>
    <button class="hbtn" id="inviteBtn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.5 13.5a4 4 0 0 0 5.7 0l3-3a4 4 0 0 0-5.7-5.7l-1.2 1.2"/><path d="M13.5 10.5a4 4 0 0 0-5.7 0l-3 3a4 4 0 0 0 5.7 5.7l1.2-1.2"/></svg> 초대 링크 복사</button>
    <button class="hbtn" id="saveBtn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m8 11 4 4 4-4"/><path d="M4 17v2a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-2"/></svg> 지도 저장</button>
    <button class="hbtn" id="leaveBtn">지도 목록</button>
    <span id="syncBadge" class="on"></span>
  </header>
  <div class="layout">
    <div class="map-wrap" id="mapWrap">
      __SVG__
      <div class="zoom-btns">
        <button id="zoomIn" title="확대">+</button>
        <button id="zoomOut" title="축소">−</button>
        <button id="zoomReset" title="원래대로" style="font-size:13px">⟲</button>
      </div>
      <button id="mapStatPill"></button>
      <div id="firstHint">가본 지역을 <b>눌러</b> 색칠하고<br>사진·메모로 추억을 남겨보세요<br><span class="x" id="firstHintClose">알겠어요</span></div>
    </div>
    <aside>
      <div class="big-stat">
        <div class="pct" id="pct">0%</div>
        <div class="cnt"><span id="cnt">0</span> / <span id="total">0</span> 시·군·구</div>
      </div>
      <div class="total-bar"><div id="totalBar"></div></div>

      <div id="regionPanel">
        <div class="hint" id="rpHint">지도에서 지역을 클릭하면<br>사진을 추가할 수 있어요</div>
        <div id="rpBody" style="display:none">
          <div id="rpHead">
            <img id="rpEmblem" alt="">
            <div><div id="rpName"></div><div id="rpProv"></div></div>
            <button id="rpToggle"></button>
            <button id="rpClose" title="닫기">✕</button>
          </div>
          <div class="note-row">
            <input type="date" id="rpDate" title="방문한 날">
            <textarea id="rpMemo" rows="2" maxlength="500" placeholder="이 곳에서의 기억을 남겨보세요"></textarea>
          </div>
          <div id="photoGrid"></div>
          <label class="upload-btn" id="uploadBtn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 8.5A1.5 1.5 0 0 1 6 7h2l1.6-2.2A1.5 1.5 0 0 1 10.8 4h2.4a1.5 1.5 0 0 1 1.2.8L16 7h2a1.5 1.5 0 0 1 1.5 1.5V18A1.5 1.5 0 0 1 18 19.5H6A1.5 1.5 0 0 1 4.5 18Z"/><circle cx="12" cy="13" r="3.2"/></svg> 사진 추가<input type="file" id="photoInput" accept="image/*" multiple hidden></label>
          <div id="uploadMsg"></div>
        </div>
      </div>

      <h2 id="feedHead">여행 앨범</h2>
      <div id="memoryFeed"></div>

      <h2 id="statsHead">시·도별 달성률</h2>
      <div id="provList"></div>
      <div class="btns">
        <button id="resetBtn">전체 초기화</button>
      </div>
    </aside>
  </div>
  <nav id="tabbar">

    <button id="tabStats"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M5 20v-7"/><path d="M12 20V6"/><path d="M19 20V9"/></svg>기록</button>

<script>
const PROV = __PROV__;
const EMBLEMS = __EMBLEMS__;   // 시·군·구 코드 → 공식 휘장(심벌) 이미지 URL
const svg = document.getElementById("map");
const paths = [...svg.querySelectorAll("#municipalities path")];
const muniTexts = [...svg.querySelectorAll("#muniLabels text")];
const provLabelsG = svg.querySelector("#provLabels");
const tooltip = document.getElementById("tooltip");
const $ = id => document.getElementById(id);

let ROOM = null, TOKEN = null;
let visited = new Set();
let photos = {};   // code -> [{url, name}]
let notes = {};    // code -> {date, memo}
let selected = null;
let pollTimer = null;
const nameByCode = {};
paths.forEach(p => { nameByCode[p.dataset.code] = p.dataset.name; });

// 접속한 적 있는 지도 목록: {id: {name, token}}
const savedRooms = JSON.parse(localStorage.getItem("travelRooms") || "{}");
function rememberRoom(id, name, token) {
  savedRooms[id] = { name, token };
  localStorage.setItem("travelRooms", JSON.stringify(savedRooms));
}

// ---- API ----
async function api(path, opts = {}) {
  opts.headers = Object.assign({ "x-token": TOKEN || "" }, opts.headers || {});
  const r = await fetch(path, opts);
  const body = await r.json().catch(() => ({}));
  if (!r.ok) throw Object.assign(new Error(body.error || r.status), { status: r.status });
  return body;
}
function setBadge(on, text) {
  const b = $("syncBadge");
  b.className = on ? "on" : "off";
  b.textContent = text || (on ? "동기화됨" : "연결 끊김");
}
const ICON_PIN = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-5.4-7-11a7 7 0 0 1 14 0c0 5.6-7 11-7 11Z"/><circle cx="12" cy="10" r="2.6"/></svg>';

// ---- 화면 전환 ----
function showLanding() {
  $("landing").style.display = "flex";
  $("app").style.display = "none";
  const ids = Object.keys(savedRooms);
  $("myRoomsWrap").style.display = ids.length ? "" : "none";
  $("myRooms").innerHTML = ids.map(id =>
    `<a href="/?room=${id}">${ICON_PIN} ${savedRooms[id].name}</a>`).join("");
}
async function enterRoom(id) {
  ROOM = id;
  TOKEN = savedRooms[id] ? savedRooms[id].token : null;
  try {
    const s = await api(`/api/state?room=${id}`);
    startApp(s);
  } catch (e) {
    if (e.status === 403 || e.status === 404) showJoin(id);
    else { alert("서버에 연결할 수 없습니다."); showLanding(); }
  }
}
function showJoin(id) {
  $("joinModal").style.display = "flex";
  $("joinPw").focus();
  $("joinBtn").onclick = async () => {
    $("joinErr").textContent = "";
    try {
      const j = await api("/api/join", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ room: id, password: $("joinPw").value })
      });
      TOKEN = j.token;
      rememberRoom(id, j.name, j.token);
      $("joinModal").style.display = "none";
      const s = await api(`/api/state?room=${id}`);
      startApp(s);
    } catch (e) {
      $("joinErr").textContent = e.message === "Failed to fetch" ? "서버 연결 실패" : e.message;
    }
  };
  $("joinPw").onkeydown = e => { if (e.key === "Enter") $("joinBtn").click(); };
}
function startApp(state) {
  $("landing").style.display = "none";
  $("app").style.display = "flex";
  $("roomName").textContent = state.name;
  rememberRoom(ROOM, state.name, TOKEN);
  applyState(state);
  setBadge(true);
  updateLabels();
  maybeShowFirstHint();
  clearInterval(pollTimer);
  pollTimer = setInterval(refresh, 12000);   // 다른 사람의 변경 반영
}
function applyState(s) {
  visited = new Set((s.visited || []).map(String));
  photos = s.photos || {};
  notes = s.notes || {};
  paths.forEach(p => p.classList.toggle("visited", visited.has(p.dataset.code)));
  render();
  renderFeed();
  if (selected) renderPanel();
}
async function refresh() {
  try {
    applyState(await api(`/api/state?room=${ROOM}`));
    setBadge(true);
    updateLabels();
  } catch { setBadge(false); }
}

$("createBtn").onclick = async () => {
  $("createErr").textContent = "";
  try {
    const j = await api("/api/rooms", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: $("newName").value.trim(), password: $("newPw").value })
    });
    TOKEN = j.token;
    rememberRoom(j.id, j.name, j.token);
    location.href = "/?room=" + j.id;
  } catch (e) {
    $("createErr").textContent = e.message === "Failed to fetch" ? "서버 연결 실패" : e.message;
  }
};
const inviteBtnHtml = $("inviteBtn").innerHTML;
$("inviteBtn").onclick = async () => {
  const link = location.origin + "/?room=" + ROOM;
  try { await navigator.clipboard.writeText(link); $("inviteBtn").textContent = "✓ 복사됨!"; }
  catch { prompt("초대 링크:", link); }
  setTimeout(() => { $("inviteBtn").innerHTML = inviteBtnHtml; }, 1500);
};
$("leaveBtn").onclick = () => { location.href = "/"; };

// ---- 지도 이미지 저장 / 공유 ----
const emblemDataCache = {};
async function toDataURL(url) {
  if (emblemDataCache[url]) return emblemDataCache[url];
  const blob = await (await fetch(url)).blob();
  const data = await new Promise(res => {
    const fr = new FileReader();
    fr.onload = () => res(fr.result);
    fr.readAsDataURL(blob);
  });
  emblemDataCache[url] = data;
  return data;
}

async function buildMapImage() {
  const W = 800, H = 1100, HEADER = 132, DPR = 2;
  // 1) 지도 SVG 복제 (전국 뷰) + 방문 색 인라인 + 심벌 data URI
  const clone = svg.cloneNode(true);
  clone.setAttribute("viewBox", `0 0 ${W} ${H}`);
  clone.removeAttribute("id");
  clone.querySelectorAll("#municipalities path").forEach(p => {
    p.classList.remove("visited", "selected");
    p.setAttribute("fill", visited.has(p.dataset.code) ? "#b7e4c7" : "#ffffff");
    p.setAttribute("stroke", "#c6cfd9");
    p.setAttribute("stroke-width", "0.55");
  });
  // 라벨은 전국 뷰에서 겹치므로 제거, 마커만 다시 그림
  const cLabels = clone.querySelector("#muniLabels"); if (cLabels) cLabels.remove();
  const cMarks = clone.querySelector("#visitMarks"); if (cMarks) cMarks.remove();
  // 방문 심벌을 지역 중심에 data URI로 배치
  const markG = document.createElementNS("http://www.w3.org/2000/svg", "g");
  for (const p of paths) {
    if (!visited.has(p.dataset.code)) continue;
    const bb = p.getBBox();
    const em = EMBLEMS[p.dataset.code];
    const size = Math.min(Math.min(bb.width, bb.height) * 0.9, 26);
    const cx = bb.x + bb.width / 2, cy = bb.y + bb.height / 2;
    if (em) {
      const data = await toDataURL(em);
      const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
      img.setAttributeNS("http://www.w3.org/1999/xlink", "href", data);
      img.setAttribute("href", data);
      img.setAttribute("x", cx - size / 2); img.setAttribute("y", cy - size / 2);
      img.setAttribute("width", size); img.setAttribute("height", size);
      img.setAttribute("preserveAspectRatio", "xMidYMid meet");
      markG.appendChild(img);
    }
  }
  clone.appendChild(markG);
  clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
  const svgStr = new XMLSerializer().serializeToString(clone);
  const svgImg = new Image();
  await new Promise((res, rej) => {
    svgImg.onload = res; svgImg.onerror = rej;
    svgImg.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svgStr);
  });
  // 2) 캔버스에 헤더 + 지도
  const canvas = document.createElement("canvas");
  canvas.width = W * DPR; canvas.height = (H + HEADER) * DPR;
  const ctx = canvas.getContext("2d");
  ctx.scale(DPR, DPR);
  ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, W, H + HEADER);
  // 헤더 텍스트
  const n = visited.size, pct = Math.round(n / paths.length * 1000) / 10;
  ctx.fillStyle = "#1f2937";
  ctx.font = "700 34px 'Malgun Gothic','Apple SD Gothic Neo',sans-serif";
  ctx.textBaseline = "alphabetic";
  ctx.fillText($("roomName").textContent || "나의 여행 지도", 40, 58);
  ctx.fillStyle = "#3b9c6e";
  ctx.font = "700 26px 'Malgun Gothic',sans-serif";
  const pctStr = `${pct}%`;
  ctx.fillText(pctStr, 40, 100);
  const pctW = ctx.measureText(pctStr).width;
  ctx.fillStyle = "#6b7280";
  ctx.font = "400 18px 'Malgun Gothic',sans-serif";
  ctx.fillText(`${n} / ${paths.length} 시·군·구 방문`, 40 + pctW + 12, 100);
  ctx.textAlign = "right";
  ctx.fillStyle = "#9ca3af";
  ctx.font = "400 15px 'Malgun Gothic',sans-serif";
  ctx.fillText("map-for-memory", W - 40, 100);
  ctx.textAlign = "left";
  ctx.strokeStyle = "#eef0f3"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(40, HEADER - 12); ctx.lineTo(W - 40, HEADER - 12); ctx.stroke();
  ctx.drawImage(svgImg, 0, HEADER, W, H);
  return await new Promise(res => canvas.toBlob(res, "image/png"));
}

$("saveBtn").onclick = async () => {
  const btn = $("saveBtn");
  const orig = btn.innerHTML;
  btn.textContent = "만드는 중…"; btn.disabled = true;
  try {
    const blob = await buildMapImage();
    const fname = `${($("roomName").textContent || "여행지도").replace(/[\\/:*?"<>|]/g, "")}.png`;
    const file = new File([blob], fname, { type: "image/png" });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: $("roomName").textContent });
    } else {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = fname;
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    }
  } catch (e) {
    if (e && e.name !== "AbortError") alert("이미지를 만들지 못했어요. 다시 시도해 주세요.");
  } finally {
    btn.innerHTML = orig; btn.disabled = false;
  }
};

// ---- 클릭: 방문 토글 + 지역 선택 ----
let downPos = null;
paths.forEach(p => {
  p.addEventListener("pointerdown", e => { downPos = [e.clientX, e.clientY]; });
  p.addEventListener("pointerup", e => {
    if (!downPos) return;
    const moved = Math.hypot(e.clientX - downPos[0], e.clientY - downPos[1]);
    downPos = null;
    if (moved > 6) return;
    // 미방문 지역만 클릭으로 방문 표시. 해제는 상세 패널의 버튼으로만 (실수 방지)
    if (!visited.has(p.dataset.code)) toggleVisited(p.dataset.code);
    select(p.dataset.code);
  });
});
function toggleVisited(code) {
  const p = paths.find(x => x.dataset.code === code);
  const on = !visited.has(code);
  if (on) { visited.add(code); p.classList.add("visited"); }
  else { visited.delete(code); p.classList.remove("visited"); }
  render(); updateLabels();
  api("/api/visited", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ room: ROOM, code, on })
  }).then(() => setBadge(true)).catch(() => setBadge(false));
}

// ---- 모바일 레이아웃: 하단 탭 + 바텀시트 ----
const mq = window.matchMedia("(max-width: 720px)");
const asideEl = document.querySelector("aside");
const regionPanelEl = $("regionPanel");
function layoutMode() {
  document.body.classList.toggle("is-mobile", mq.matches);
  if (mq.matches) {
    document.body.appendChild(regionPanelEl);   // 바텀시트로 이동
  } else {
    asideEl.insertBefore(regionPanelEl, $("feedHead"));  // 사이드바 상단(앨범 위)으로 복귀
    regionPanelEl.classList.remove("open");
    setTab("map");
  }
}
function setTab(t) {
  document.body.classList.toggle("tab-stats", t === "stats");
  $("tabMap").classList.toggle("active", t === "map");
  $("tabStats").classList.toggle("active", t === "stats");
  if (t === "map") updateLabels();   // 숨겨져 있던 동안 크기가 0이었으므로 다시 계산
}
$("tabMap").onclick = () => setTab("map");
$("tabStats").onclick = () => setTab("stats");
$("mapStatPill").onclick = () => setTab("stats");
$("rpClose").onclick = () => {
  regionPanelEl.classList.remove("open");
  paths.forEach(p => p.classList.remove("selected"));
  selected = null;
};
mq.addEventListener("change", layoutMode);
window.addEventListener("resize", layoutMode);
layoutMode();

// ---- 선택 지역 패널 ----
function select(code) {
  selected = code;
  dismissFirstHint();
  paths.forEach(p => p.classList.toggle("selected", p.dataset.code === code));
  renderPanel();
  if (mq.matches) regionPanelEl.classList.add("open");
}
function renderPanel() {
  if (!selected) return;
  const p = paths.find(x => x.dataset.code === selected);
  $("rpHint").style.display = "none";
  $("rpBody").style.display = "";
  $("rpName").textContent = p.dataset.name;
  $("rpProv").textContent = PROV[selected.slice(0, 2)] || "";
  const emblem = EMBLEMS[selected];
  $("rpEmblem").style.display = emblem ? "block" : "none";
  if (emblem) $("rpEmblem").src = emblem;
  const v = visited.has(selected);
  const t = $("rpToggle");
  t.textContent = v ? "✓ 방문함" : "방문 표시";
  t.className = v ? "v" : "";
  const note = notes[selected] || {};
  $("rpDate").value = note.date || "";
  $("rpMemo").value = note.memo || "";
  const grid = $("photoGrid");
  grid.innerHTML = "";
  (photos[selected] || []).forEach(ph => {
    const div = document.createElement("div");
    div.className = "ph";
    div.innerHTML = `<img src="${ph.url}" alt="${ph.name}" loading="lazy"><button class="del" title="삭제">✕</button>`;
    div.querySelector("img").onclick = () => {
      $("lightbox").style.display = "flex";
      $("lightbox").querySelector("img").src = ph.url;
    };
    div.querySelector(".del").onclick = async e => {
      e.stopPropagation();
      if (!confirm("이 사진을 삭제할까요?")) return;
      try {
        await api(`/api/photo?room=${ROOM}&code=${selected}`, {
          method: "DELETE", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url: ph.url })
        });
        photos[selected] = (photos[selected] || []).filter(x => x.url !== ph.url);
        if (!photos[selected].length) delete photos[selected];
        renderPanel(); renderFeed();
      } catch { alert("삭제 실패"); }
    };
    grid.appendChild(div);
  });
}
$("rpToggle").onclick = () => { if (selected) { toggleVisited(selected); renderPanel(); } };

// 방문 날짜·메모 저장 (입력이 끝나면)
let noteTimer = null;
function saveNote() {
  if (!selected) return;
  const code = selected;
  const date = $("rpDate").value || "";
  const memo = $("rpMemo").value || "";
  if (date || memo) notes[code] = { date, memo };
  else delete notes[code];
  // 메모를 남겼는데 아직 미방문이면 자동으로 방문 처리
  if ((date || memo) && !visited.has(code)) toggleVisited(code);
  renderFeed();
  api("/api/note", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ room: ROOM, code, date, memo })
  }).then(() => setBadge(true)).catch(() => setBadge(false));
}
$("rpDate").onchange = saveNote;
$("rpMemo").oninput = () => { clearTimeout(noteTimer); noteTimer = setTimeout(saveNote, 600); };
$("rpMemo").onblur = () => { clearTimeout(noteTimer); saveNote(); };

// 여행 앨범 피드 (기록 탭): 방문 날짜 최신순, 사진·메모 있는 곳 위주
function renderFeed() {
  const feed = $("memoryFeed");
  if (!feed) return;
  const entries = [];
  const codes = new Set([...Object.keys(notes), ...Object.keys(photos)]);
  codes.forEach(code => {
    if (!nameByCode[code]) return;   // 지도에 없는 코드는 건너뜀
    const note = notes[code] || {};
    const ph = photos[code] || [];
    if (!note.date && !note.memo && ph.length === 0) return;
    entries.push({ code, date: note.date || "", memo: note.memo || "", photos: ph });
  });
  entries.sort((a, b) => (b.date || "0").localeCompare(a.date || "0"));
  feed.innerHTML = entries.map(e => {
    const emblem = EMBLEMS[e.code];
    const prov = PROV[e.code.slice(0, 2)] || "";
    const name = nameByCode[e.code] || "";
    const dateHtml = e.date ? `<span class="mem-date">${e.date.replace(/-/g, ".")}</span>` : "";
    const memoHtml = e.memo ? `<div class="mem-memo">${escapeHtml(e.memo)}</div>` : "";
    const photosHtml = e.photos.length
      ? `<div class="mem-photos">${e.photos.map(p =>
          `<img src="${p.url}" loading="lazy" data-full="${p.url}">`).join("")}</div>`
      : "";
    return `<div class="mem-card" data-code="${e.code}">
      <div class="mem-head">
        ${emblem ? `<img src="${emblem}" alt="">` : ""}
        <div><div class="mem-title">${name}</div><div class="mem-prov">${prov}</div></div>
        ${dateHtml}
      </div>${memoHtml}${photosHtml}</div>`;
  }).join("");
  feed.querySelectorAll("img[data-full]").forEach(img => {
    img.onclick = (ev) => {
      ev.stopPropagation();   // 사진 클릭은 확대 (지역 이동 아님)
      $("lightbox").style.display = "flex";
      $("lightbox").querySelector("img").src = img.dataset.full;
    };
  });
  feed.querySelectorAll(".mem-card").forEach(card => {
    card.onclick = () => focusRegion(card.dataset.code);
  });
}
function escapeHtml(s) {
  return s.replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

// 첫 방문 안내: 방이 비어 있고, 이 방에서 아직 안내를 닫지 않았으면 표시
function maybeShowFirstHint() {
  const seenKey = "hintSeen:" + ROOM;
  const empty = visited.size === 0 && Object.keys(photos).length === 0;
  if (empty && !localStorage.getItem(seenKey)) $("firstHint").style.display = "block";
}
$("firstHintClose").onclick = () => {
  $("firstHint").style.display = "none";
  localStorage.setItem("hintSeen:" + ROOM, "1");
};
// 지역을 한 번 누르면 안내 자동 숨김
function dismissFirstHint() {
  if ($("firstHint").style.display === "block") {
    $("firstHint").style.display = "none";
    localStorage.setItem("hintSeen:" + ROOM, "1");
  }
}

// 사진 압축: 긴 변 1600px, JPEG 품질 0.85 (Vercel 요청 크기 제한 대응 + 저장 용량 절약)
async function compressImage(file) {
  if (!/^image\//.test(file.type)) return { blob: file, name: file.name };
  const img = await createImageBitmap(file).catch(() => null);
  if (!img) return { blob: file, name: file.name };
  const max = 1600;
  const k = Math.min(1, max / Math.max(img.width, img.height));
  if (k === 1 && file.size < 2 * 1024 * 1024) return { blob: file, name: file.name };
  const c = document.createElement("canvas");
  c.width = Math.round(img.width * k);
  c.height = Math.round(img.height * k);
  c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
  const blob = await new Promise(r => c.toBlob(r, "image/jpeg", 0.85));
  if (!blob) return { blob: file, name: file.name };
  return { blob, name: file.name.replace(/\.\w+$/, "") + ".jpg" };
}
$("photoInput").addEventListener("change", async e => {
  if (!selected) { e.target.value = ""; return; }
  const files = [...e.target.files];
  e.target.value = "";
  for (let i = 0; i < files.length; i++) {
    $("uploadMsg").textContent = `업로드 중… (${i + 1}/${files.length})`;
    try {
      const { blob, name } = await compressImage(files[i]);
      const j = await api(`/api/photo?room=${ROOM}&code=${selected}`, {
        method: "POST",
        headers: { "Content-Type": "application/octet-stream", "X-Filename": encodeURIComponent(name) },
        body: blob
      });
      (photos[selected] = photos[selected] || []).push({ url: j.url, name: j.name });
    } catch { alert(`${files[i].name} 업로드 실패`); }
  }
  $("uploadMsg").textContent = "";
  // 사진을 올렸는데 미방문이면 자동 방문 처리
  if ((photos[selected] || []).length && !visited.has(selected)) toggleVisited(selected);
  renderPanel(); renderFeed();
});
$("lightbox").onclick = () => { $("lightbox").style.display = "none"; };

// ---- 툴팁 ----
paths.forEach(p => {
  p.addEventListener("pointermove", e => {
    const code = p.dataset.code;
    const prov = PROV[code.slice(0, 2)] || "";
    const mark = visited.has(code) ? ' <span class="v">✓ 방문</span>' : "";
    const ph = (photos[code] || []).length;
    tooltip.innerHTML = `${prov} ${p.dataset.name}${mark}${ph ? ` · 사진 ${ph}` : ""}`;
    tooltip.style.display = "block";
    tooltip.style.left = (e.clientX + 14) + "px";
    tooltip.style.top = (e.clientY + 14) + "px";
  });
  p.addEventListener("pointerleave", () => { tooltip.style.display = "none"; });
});

// ---- 통계 ----
const provCodes = Object.keys(PROV);
const provTotals = {};
paths.forEach(p => {
  const pc = p.dataset.code.slice(0, 2);
  provTotals[pc] = (provTotals[pc] || 0) + 1;
});
$("total").textContent = paths.length;
const provList = $("provList");
provCodes.forEach(pc => {
  const row = document.createElement("div");
  row.className = "prov-row"; row.id = "prov-" + pc;
  row.innerHTML = `<span class="name">${PROV[pc]}</span><div class="bar"><div></div></div><span class="num"></span>`;
  provList.appendChild(row);
});
function render() {
  const n = visited.size;
  $("cnt").textContent = n;
  const pct = paths.length ? n / paths.length * 100 : 0;
  const pctText = (pct > 0 && pct < 10 ? pct.toFixed(1) : Math.round(pct)) + "%";
  $("pct").textContent = pctText;
  $("totalBar").style.width = pct + "%";
  $("mapStatPill").innerHTML = `<b>${n}</b> / ${paths.length} · ${pctText}`;
  const pv = {};
  visited.forEach(c => { const pc = c.slice(0, 2); pv[pc] = (pv[pc] || 0) + 1; });
  provCodes.forEach(pc => {
    const row = $("prov-" + pc);
    const v = pv[pc] || 0, t = provTotals[pc] || 0;
    row.querySelector(".bar > div").style.width = (t ? v / t * 100 : 0) + "%";
    row.querySelector(".num").textContent = `${v}/${t}`;
    row.classList.toggle("done", v === t && t > 0);
  });
}

// ---- 확대/이동 + 라벨 표시 ----
const VB0 = svg.viewBox.baseVal;
const home = { x: VB0.x, y: VB0.y, w: VB0.width, h: VB0.height };
let vb = { ...home };
function applyVB() {
  svg.setAttribute("viewBox", `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
  updateLabels();
}
// 방문 마커 오버레이 (라벨 좌표 재사용) — 지역명이 위에 오도록 라벨 아래 레이어에 삽입
const marksG = document.createElementNS("http://www.w3.org/2000/svg", "g");
marksG.id = "visitMarks";
marksG.setAttribute("pointer-events", "none");
svg.insertBefore(marksG, svg.querySelector("#muniLabels"));
const pathByCode = {};
paths.forEach(p => { pathByCode[p.dataset.code] = p; });
const bboxCache = {};
function regionBBox(code) {
  // 숨겨진 상태(getBBox=0)는 캐시하지 않아 나중에 다시 정확히 측정
  if ((!bboxCache[code] || !bboxCache[code].width) && pathByCode[code]) {
    const bb = pathByCode[code].getBBox();
    if (bb.width) bboxCache[code] = bb;
    else return bb;
  }
  return bboxCache[code];
}
// 앨범 카드 → 해당 지역으로 지도 이동 + 선택
function focusRegion(code) {
  setTab("map");
  const bb = regionBBox(code);
  if (bb && bb.width) {
    const cx = bb.x + bb.width / 2, cy = bb.y + bb.height / 2;
    const ar = home.w / home.h;
    // 지역이 화면의 약 45%를 차지하도록 여백 포함 크기 계산
    let w = Math.max(bb.width, bb.height * ar) / 0.45;
    w = Math.min(Math.max(w, home.w / 18), home.w);
    let h = w / ar;
    vb = { x: cx - w / 2, y: cy - h / 2, w, h };
    applyVB();
  }
  select(code);
}

// ---- 지역 검색 ----
const searchIndex = paths.map(p => ({
  code: p.dataset.code,
  name: p.dataset.name,
  prov: PROV[p.dataset.code.slice(0, 2)] || ""
}));
const searchInput = $("searchInput");
const searchResults = $("searchResults");
let srActive = -1, srItems = [];

function runSearch(q) {
  q = q.trim();
  if (!q) { closeSearch(); return; }
  const scored = [];
  for (const r of searchIndex) {
    const full = r.prov + " " + r.name;
    let score = -1;
    if (r.name.startsWith(q)) score = 0;
    else if (r.name.includes(q)) score = 1;
    else if (full.includes(q)) score = 2;
    if (score >= 0) scored.push({ ...r, score });
  }
  scored.sort((a, b) => a.score - b.score || a.name.localeCompare(b.name));
  srItems = scored.slice(0, 12);
  srActive = srItems.length ? 0 : -1;
  if (!srItems.length) {
    searchResults.innerHTML = `<div class="sr-empty">"${escapeHtml(q)}" 검색 결과가 없어요</div>`;
  } else {
    searchResults.innerHTML = srItems.map((r, i) => {
      const em = EMBLEMS[r.code];
      const vis = visited.has(r.code) ? `<span class="sr-visited">✓</span>` : "";
      return `<div class="sr-item${i === srActive ? " active" : ""}" data-code="${r.code}" data-i="${i}">
        ${em ? `<img src="${em}" alt="">` : ""}
        <span>${escapeHtml(r.name)}</span> ${vis}
        <span class="sr-prov">${r.prov}</span>
      </div>`;
    }).join("");
    searchResults.querySelectorAll(".sr-item").forEach(el => {
      el.onmousedown = (e) => { e.preventDefault(); pickSearch(el.dataset.code); };
      el.onmouseenter = () => { srActive = +el.dataset.i; highlightSR(); };
    });
  }
  searchResults.classList.add("show");
}
function highlightSR() {
  searchResults.querySelectorAll(".sr-item").forEach((el, i) =>
    el.classList.toggle("active", i === srActive));
}
function pickSearch(code) {
  focusRegion(code);
  searchInput.value = "";
  closeSearch();
  searchInput.blur();
}
function closeSearch() {
  searchResults.classList.remove("show");
  searchResults.innerHTML = "";
  srItems = []; srActive = -1;
}
searchInput.addEventListener("input", () => runSearch(searchInput.value));
searchInput.addEventListener("focus", () => { if (searchInput.value.trim()) runSearch(searchInput.value); });
searchInput.addEventListener("keydown", (e) => {
  if (!srItems.length && e.key !== "Escape") return;
  if (e.key === "ArrowDown") { e.preventDefault(); srActive = Math.min(srActive + 1, srItems.length - 1); highlightSR(); }
  else if (e.key === "ArrowUp") { e.preventDefault(); srActive = Math.max(srActive - 1, 0); highlightSR(); }
  else if (e.key === "Enter") { e.preventDefault(); if (srItems[srActive]) pickSearch(srItems[srActive].code); }
  else if (e.key === "Escape") { closeSearch(); searchInput.blur(); }
});
document.addEventListener("click", (e) => {
  if (!$("searchWrap").contains(e.target)) closeSearch();
});

function updateLabels() {
  const rect = svg.getBoundingClientRect();
  if (!rect.width) return;
  const pxPerUnit = rect.width / vb.w;
  svg.querySelector("#muniLabels").style.fontSize = (11 / pxPerUnit) + "px";
  provLabelsG.style.fontSize = (13 / pxPerUnit) + "px";
  const showMuni = vb.w <= 620;
  provLabelsG.style.display = showMuni ? "none" : "";
  const marks = [];
  muniTexts.forEach(t => {
    let labelShown = false;
    if (showMuni) {
      const fits = parseFloat(t.dataset.w) * pxPerUnit > t.textContent.length * 11 + 8;
      labelShown = fits;
      t.style.display = fits ? "" : "none";
      t.classList.toggle("on-visited", visited.has(t.dataset.code));
    } else {
      t.style.display = "none";
    }
    if (!visited.has(t.dataset.code)) return;
    const x = +t.getAttribute("x");
    const y = +t.getAttribute("y");
    const emblem = EMBLEMS[t.dataset.code];
    if (emblem) {
      // 지자체 심벌을 지역 안에 반투명하게 채움. 지역 크기에 맞추되 너무 작아지지 않게
      const w = parseFloat(t.dataset.w);
      const h = parseFloat(t.dataset.h) || w;
      // 심벌이 지역 경계를 넘지 않도록 지역 크기 안에 가둔다.
      const fontSvg = 11 / pxPerUnit;
      const availW = w * 0.86;
      // 라벨이 보이면 심벌은 이름 위쪽 공간에만 (지역 위 경계 ~ 라벨 위끝),
      // 안 보이면 지역 중심에 크게.
      const availH = labelShown
        ? Math.max(0, h / 2 - fontSvg * 0.6 - 2 / pxPerUnit)
        : h * 0.82;
      let size = Math.min(w, h) * 0.6;
      size = Math.min(size, availW, availH, 96 / pxPerUnit);
      size = Math.max(size, 12 / pxPerUnit);          // 너무 작지 않게
      size = Math.min(size, availW, availH);          // 단, 지역을 넘지는 않게 최종 캡
      const half = size / 2;
      let cx = x;
      let cy = labelShown ? (y - fontSvg * 0.5 - 2 / pxPerUnit - half) : y;
      // 심벌 상자를 지역 bbox 안으로 강제 클램프 (경계 밖으로 삐져나오지 않게)
      const bb = regionBBox(t.dataset.code);
      if (bb) {
        if (bb.width > size) cx = Math.min(Math.max(cx, bb.x + half), bb.x + bb.width - half);
        else cx = bb.x + bb.width / 2;
        if (bb.height > size) cy = Math.min(Math.max(cy, bb.y + half), bb.y + bb.height - half);
        else cy = bb.y + bb.height / 2;
      }
      marks.push(
        `<image href="${emblem}" x="${cx - half}" y="${cy - half}" width="${size}" height="${size}"` +
        ` opacity="0.72" preserveAspectRatio="xMidYMid meet"/>`);
    } else {
      // 휘장이 없는 지역은 체크 핀으로 (줌 무관 고정 크기)
      const s = 1 / pxPerUnit;
      const py = y - (labelShown ? 9 / pxPerUnit : 0);
      marks.push(
        `<g transform="translate(${x} ${py}) scale(${s})">` +
        `<path d="M0 0C-4.5-6-8-9.2-8-13a8 8 0 1 1 16 0c0 3.8-3.5 7-8 13Z"` +
        ` fill="#2d6a4f" stroke="#ffffff" stroke-width="1.5"/>` +
        `<path d="M-3.2-14.5-0.8-12 3.4-16.2"` +
        ` stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>` +
        `</g>`);
    }
  });
  marksG.innerHTML = marks.join("");
}
function zoomAt(cx, cy, factor) {
  const newW = Math.min(home.w * 2, Math.max(home.w / 20, vb.w * factor));
  const k = newW / vb.w;
  vb.x = cx - (cx - vb.x) * k;
  vb.y = cy - (cy - vb.y) * k;
  vb.w = newW; vb.h = vb.h * k;
  applyVB();
}
function clientToSvg(e) {
  const r = svg.getBoundingClientRect();
  return [vb.x + (e.clientX - r.left) / r.width * vb.w,
          vb.y + (e.clientY - r.top) / r.height * vb.h];
}
svg.addEventListener("wheel", e => {
  e.preventDefault();
  const [cx, cy] = clientToSvg(e);
  zoomAt(cx, cy, e.deltaY > 0 ? 1.2 : 1 / 1.2);
}, { passive: false });
$("zoomIn").onclick = () => zoomAt(vb.x + vb.w / 2, vb.y + vb.h / 2, 1 / 1.4);
$("zoomOut").onclick = () => zoomAt(vb.x + vb.w / 2, vb.y + vb.h / 2, 1.4);
$("zoomReset").onclick = () => { vb = { ...home }; applyVB(); };
window.addEventListener("resize", updateLabels);

const pointers = new Map();
let pinchDist = 0;
svg.addEventListener("pointerdown", e => {
  pointers.set(e.pointerId, e);
  if (pointers.size === 2) {
    const [a, b] = [...pointers.values()];
    pinchDist = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
  }
  svg.setPointerCapture(e.pointerId);
});
svg.addEventListener("pointermove", e => {
  if (!pointers.has(e.pointerId)) return;
  const prev = pointers.get(e.pointerId);
  pointers.set(e.pointerId, e);
  const r = svg.getBoundingClientRect();
  if (pointers.size === 1) {
    const dx = (e.clientX - prev.clientX) / r.width * vb.w;
    const dy = (e.clientY - prev.clientY) / r.height * vb.h;
    if (dx || dy) { svg.classList.add("dragging"); vb.x -= dx; vb.y -= dy; applyVB(); }
  } else if (pointers.size === 2) {
    const [a, b] = [...pointers.values()];
    const d = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
    if (pinchDist > 0 && d > 0) {
      const mx = (a.clientX + b.clientX) / 2, my = (a.clientY + b.clientY) / 2;
      const cx = vb.x + (mx - r.left) / r.width * vb.w;
      const cy = vb.y + (my - r.top) / r.height * vb.h;
      zoomAt(cx, cy, pinchDist / d);
      pinchDist = d;
    }
  }
});
["pointerup", "pointercancel"].forEach(ev => svg.addEventListener(ev, e => {
  pointers.delete(e.pointerId);
  if (pointers.size === 0) svg.classList.remove("dragging");
  pinchDist = 0;
}));

// ---- 내보내기 / 가져오기 / 초기화 ----
function pushAll(codes) {
  return api("/api/visited", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ room: ROOM, codes })
  });
}
$("resetBtn").onclick = async () => {
  if (!confirm(`방문 표시 ${visited.size}곳을 모두 지울까요?\n(사진·메모는 지워지지 않습니다. 함께 쓰는 지도라면 모두에게 적용됩니다.)`)) return;
  visited.clear();
  paths.forEach(p => p.classList.remove("visited"));
  render(); updateLabels();
  if (selected) renderPanel();
  try { await pushAll([]); setBadge(true); } catch { setBadge(false); }
};

// ---- 시작 ----
const roomParam = new URLSearchParams(location.search).get("room");
if (roomParam && /^[a-z0-9]{6,12}$/.test(roomParam)) enterRoom(roomParam);
else showLanding();
</script>
</body>
</html>

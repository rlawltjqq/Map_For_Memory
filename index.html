<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>나의 여행 지도</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    background: #f4f6f9; color: #1f2937; height: 100vh; height: 100dvh;
    display: flex; flex-direction: column;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.01em;
  }
  button { font-family: inherit; }
  input { font-family: inherit; }
  .icon { width: 1.15em; height: 1.15em; vertical-align: -0.2em; flex-shrink: 0; }

  /* ---- 랜딩 ---- */
  #landing { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
  #landing .card {
    background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; padding: 32px 28px;
    width: 100%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,.05);
  }
  #landing h1 { font-size: 22px; text-align: center; }
  #landing .desc { font-size: 13px; color: #6b7280; text-align: center; margin: 6px 0 22px; }
  #landing h3 { font-size: 13px; color: #6b7280; margin: 16px 0 8px; }
  #landing input {
    width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #d1d5db;
    border-radius: 8px; margin-bottom: 8px;
  }
  #landing .primary {
    width: 100%; padding: 10px; font-size: 14px; font-weight: 600; border: none;
    border-radius: 8px; background: #3b9c6e; color: #fff; cursor: pointer;
  }
  #landing .primary:hover { background: #2f7d58; }
  .err { font-size: 12.5px; color: #b91c1c; margin-top: 6px; min-height: 16px; }
  #myRooms a {
    display: block; padding: 9px 12px; border: 1px solid #e5e7eb; border-radius: 8px;
    margin-bottom: 6px; font-size: 14px; color: #1f2937; text-decoration: none;
  }
  #myRooms a:hover { background: #f3f4f6; }
  #landing .tip { font-size: 12px; color: #9ca3af; margin-top: 16px; text-align: center; }

  /* ---- 앱 ---- */
  #app { flex: 1; display: none; flex-direction: column; min-height: 0; }
  header {
    padding: 10px 16px; background: #fff; border-bottom: 1px solid #e5e7eb;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  header h1 { font-size: 17px; }
  #roomName { font-size: 15px; font-weight: 700; color: #1f2937; }
  header .hbtn {
    font-size: 12px; padding: 5px 11px; border-radius: 999px; cursor: pointer;
    border: 1px solid #e2e8f0; background: #fff; color: #475569;
  }
  header .hbtn:hover { background: #f1f5f9; border-color: #cbd5e1; }
  #searchWrap { position: relative; margin-left: 8px; }
  #searchWrap .search-ic { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; pointer-events: none; }
  #searchInput {
    width: 190px; font-size: 13px; padding: 6px 10px 6px 28px; border: 1px solid #e2e8f0;
    border-radius: 999px; color: #374151; background: #fff;
  }
  #searchInput:focus { outline: none; border-color: #3b9c6e; width: 220px; }
  #searchResults {
    position: absolute; left: 0; top: calc(100% + 5px); width: 260px; max-height: 320px;
    overflow-y: auto; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px;
    box-shadow: 0 6px 20px rgba(0,0,0,.1); z-index: 20; display: none; padding: 4px;
  }
  #searchResults.show { display: block; }
  .sr-item {
    display: flex; align-items: center; gap: 8px; padding: 7px 9px; border-radius: 7px;
    cursor: pointer; font-size: 13px;
  }
  .sr-item.active, .sr-item:hover { background: #f1f7f3; }
  .sr-item img { width: 20px; height: 20px; object-fit: contain; flex-shrink: 0; }
  .sr-item .sr-prov { color: #9ca3af; font-size: 11.5px; margin-left: auto; }
  .sr-item .sr-visited { color: #3b9c6e; font-size: 11px; }
  #searchResults .sr-empty { padding: 10px; text-align: center; color: #9ca3af; font-size: 12.5px; }
  #syncBadge { font-size: 12px; padding: 3px 10px; border-radius: 999px; margin-left: auto; }
  #syncBadge::before {
    content: ""; display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: currentColor; margin-right: 6px; vertical-align: 1px;
  }
  #syncBadge.on { background: #dcf5e8; color: #1a7a4d; }
  #syncBadge.off { background: #fee2e2; color: #b91c1c; }
  .layout { flex: 1; display: flex; min-height: 0; }
  .map-wrap {
    flex: 1; position: relative; overflow: hidden; touch-action: none;
    background: linear-gradient(180deg, #eaf2fa 0%, #f4f6f9 100%);
  }
  .mapsvg { width: 100%; height: 100%; display: block; cursor: grab; }
  .mapsvg.dragging { cursor: grabbing; }
  .mapsvg.hidden { display: none; }
  /* 나라 전환 */
  #countrySwitch {
    position: absolute; top: 10px; right: 14px; z-index: 6; display: flex; gap: 4px;
    background: rgba(255,255,255,.93); border: 1px solid #e5e7eb; border-radius: 999px;
    padding: 3px; box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  #countrySwitch button {
    border: none; background: none; padding: 5px 12px; border-radius: 999px;
    font-size: 12.5px; color: #6b7280; cursor: pointer;
  }
  #countrySwitch button.active { background: #3b9c6e; color: #fff; font-weight: 600; }
  /* 경계선을 줌과 무관하게 항상 얇게 (non-scaling-stroke) */
  .g-munis path {
    transition: fill .15s; cursor: pointer;
    vector-effect: non-scaling-stroke; stroke-width: 0.7px;
  }
  .g-munis path:hover { fill: #e3f2e9; }
  .g-munis path.visited { fill: #b7e4c7; }
  .g-munis path.visited:hover { fill: #a4dcb8; }
  .g-munis path.selected { stroke: #2d6a4f; stroke-width: 1.8px; }
  .g-provinces path { vector-effect: non-scaling-stroke; stroke-width: 1.3px; }
  .g-labels text.on-visited { fill: #1b4332; }
  .zoom-btns { position: absolute; right: 14px; bottom: 14px; display: flex; flex-direction: column; gap: 6px; }
  .zoom-btns button {
    width: 38px; height: 38px; border: 1px solid #d1d5db; background: #fff; border-radius: 8px;
    font-size: 18px; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  .zoom-btns button:hover { background: #f3f4f6; }
  aside {
    width: 310px; background: #fff; border-left: 1px solid #e5e7eb;
    padding: 16px; overflow-y: auto; flex-shrink: 0;
  }
  .big-stat { text-align: center; }
  .big-stat .pct { font-size: 40px; font-weight: 700; color: #3b9c6e; }
  .big-stat .cnt { font-size: 13px; color: #6b7280; margin-top: 2px; }
  .total-bar { height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; margin: 10px 0 14px; }
  .total-bar > div { height: 100%; background: #3b9c6e; border-radius: 4px; width: 0; transition: width .3s; }
  h2 { font-size: 12.5px; color: #6b7280; font-weight: 600; margin: 14px 0 8px; }

  #regionPanel { border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; background: #fafbfc; }
  #regionPanel .hint { font-size: 12.5px; color: #9ca3af; text-align: center; padding: 6px 0; }
  #rpHead { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  #rpEmblem {
    width: 34px; height: 34px; object-fit: contain; display: none;
    background: #fff; border: 1px solid #eef0f3; border-radius: 8px; padding: 2px;
  }
  #rpName { font-size: 15px; font-weight: 700; }
  #rpProv { font-size: 12px; color: #6b7280; }
  #rpToggle {
    margin-left: auto; font-size: 12px; padding: 5px 10px; border-radius: 999px; cursor: pointer;
    border: 1px solid #d1d5db; background: #fff; color: #374151; white-space: nowrap;
  }
  #rpToggle.v { background: #3b9c6e; border-color: #3b9c6e; color: #fff; }
  #photoGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 8px; }
  #photoGrid .ph { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; cursor: pointer; }
  #photoGrid img { width: 100%; height: 100%; object-fit: cover; display: block; }
  #photoGrid .del {
    position: absolute; top: 3px; right: 3px; width: 20px; height: 20px; border-radius: 50%;
    background: rgba(0,0,0,.55); color: #fff; border: none; font-size: 12px; line-height: 1;
    cursor: pointer; display: none;
  }
  #photoGrid .ph:hover .del { display: block; }
  .upload-btn {
    display: block; text-align: center; font-size: 13px; padding: 8px; border-radius: 8px;
    border: 1px dashed #9ca3af; color: #4b5563; cursor: pointer; background: #fff;
  }
  .upload-btn:hover { background: #f3f4f6; }
  #uploadMsg { font-size: 11.5px; color: #9ca3af; text-align: center; margin-top: 6px; }
  /* 방문 기록 (여러 번 방문 지원) */
  .sec-head {
    font-size: 11.5px; font-weight: 600; color: #9ca3af; margin: 12px 0 6px;
  }
  .visit-card {
    border: 1px solid #e8ecf0; border-radius: 10px; padding: 9px 10px;
    margin-bottom: 7px; background: #fff;
  }
  .visit-top { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
  .visit-top .dlabel { font-size: 11.5px; color: #6b7280; font-weight: 600; }
  .visit-top .dlabel em { font-style: normal; font-weight: 400; color: #b6bcc5; font-size: 10.5px; }
  .visit-dates { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .visit-card input[type=date] {
    flex: 1; min-width: 0; font-size: 13px; border: 1px solid #e2e8f0;
    border-radius: 7px; padding: 7px 8px; color: #374151; background: #fff;
  }
  .visit-card .tilde { color: #9ca3af; font-size: 13px; flex-shrink: 0; }
  .visit-card textarea {
    width: 100%; font-size: 13px; border: 1px solid #e2e8f0; border-radius: 7px;
    padding: 7px 8px; color: #374151; background: #fff; resize: vertical; line-height: 1.4;
  }
  .visit-card input:focus, .visit-card textarea:focus { outline: none; border-color: #3b9c6e; }
  .visit-del {
    margin-left: auto; width: 24px; height: 24px; border: none; background: #f3f4f6;
    color: #9ca3af; border-radius: 50%; font-size: 12px; cursor: pointer; flex-shrink: 0;
  }
  .visit-del:hover { background: #fee2e2; color: #b91c1c; }
  /* 방문별 사진 */
  .v-photos { display: grid; grid-template-columns: repeat(auto-fill, minmax(56px, 1fr)); gap: 5px; margin: 7px 0; }
  .v-photos .ph { position: relative; aspect-ratio: 1; border-radius: 7px; overflow: hidden; }
  .v-photos img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: pointer; }
  .v-photos .del {
    position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; border-radius: 50%;
    background: rgba(0,0,0,.55); color: #fff; border: none; font-size: 10px; line-height: 1;
    cursor: pointer; display: none;
  }
  .v-photos .ph:hover .del, .v-photos .ph:hover .mv { display: block; }
  .v-photos .mv {
    position: absolute; bottom: 2px; left: 2px; padding: 1px 5px; border-radius: 5px;
    background: rgba(0,0,0,.55); color: #fff; border: none; font-size: 9.5px;
    cursor: pointer; display: none;
  }
  /* 모바일은 hover가 없으므로 항상 노출 */
  @media (hover: none) {
    .v-photos .del, .v-photos .mv { display: block; }
  }
  /* 사진 이동 선택창 */
  #movePicker {
    position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none;
    align-items: center; justify-content: center; z-index: 40; padding: 20px;
  }
  #movePicker.show { display: flex; }
  #movePicker .card {
    background: #fff; border-radius: 14px; padding: 18px; width: 100%; max-width: 340px;
    max-height: 70vh; overflow-y: auto;
  }
  #movePicker h3 { font-size: 15px; margin-bottom: 12px; }
  #moveList button {
    display: block; width: 100%; text-align: left; padding: 10px 12px; margin-bottom: 6px;
    border: 1px solid #e5e7eb; border-radius: 9px; background: #fff; font-size: 13px;
    color: #374151; cursor: pointer;
  }
  #moveList button:hover { background: #f1f7f3; border-color: #3b9c6e; }
  #moveList button.cur { background: #f1f7f3; border-color: #3b9c6e; color: #2d6a4f; font-weight: 600; }
  #moveList .mv-memo { display: block; font-size: 11.5px; color: #9ca3af; margin-top: 2px; }
  #moveCancel {
    width: 100%; padding: 9px; margin-top: 4px; border: none; border-radius: 9px;
    background: #f3f4f6; color: #4b5563; font-size: 13px; cursor: pointer;
  }
  /* 전체 초기화 확인 */
  #resetModal {
    position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none;
    align-items: center; justify-content: center; z-index: 45; padding: 20px;
  }
  #resetModal.show { display: flex; }
  #resetModal .card { background: #fff; border-radius: 14px; padding: 20px; width: 100%; max-width: 340px; }
  #resetModal h3 { font-size: 16px; margin-bottom: 8px; }
  #resetModal p { font-size: 12.5px; color: #6b7280; line-height: 1.55; margin-bottom: 12px; }
  #resetPw {
    width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #d1d5db;
    border-radius: 8px; margin-bottom: 4px;
  }
  #resetPw:focus { outline: none; border-color: #b91c1c; }
  .rm-btns { display: flex; gap: 8px; margin-top: 8px; }
  .rm-btns button { flex: 1; padding: 10px; font-size: 13.5px; border-radius: 9px; cursor: pointer; border: none; }
  #resetCancel { background: #f3f4f6; color: #4b5563; }
  #resetConfirm { background: #b91c1c; color: #fff; font-weight: 600; }
  #resetConfirm:disabled { opacity: .6; cursor: default; }
  .v-addphoto {
    width: 100%; padding: 7px; font-size: 12px; border: 1px dashed #d7dde5;
    border-radius: 7px; background: #fff; color: #6b7280; cursor: pointer;
  }
  .v-addphoto:hover { background: #f1f7f3; border-color: #3b9c6e; color: #2d6a4f; }
  .add-visit {
    width: 100%; padding: 8px; font-size: 12.5px; border: 1px dashed #cbd5e1;
    border-radius: 8px; background: #fff; color: #4b5563; cursor: pointer;
  }
  .add-visit:hover { background: #f1f7f3; border-color: #3b9c6e; color: #2d6a4f; }
  #visitList:empty + .add-visit { border-color: #9ca3af; }
  /* 여행 앨범 (기록 탭) */
  #memoryFeed:empty::after {
    content: "아직 남긴 기록이 없어요.\A지역을 눌러 사진·메모를 남겨보세요.";
    white-space: pre; display: block; text-align: center; color: #9ca3af;
    font-size: 12.5px; padding: 14px 0; line-height: 1.6;
  }
  .mem-card {
    border: 1px solid #eef0f3; border-radius: 12px; padding: 11px 12px; margin-bottom: 10px;
    background: #fafbfc; cursor: pointer; transition: background .12s, border-color .12s;
  }
  .mem-card:hover { background: #f1f7f3; border-color: #cde6d8; }
  .mem-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .mem-head img { width: 26px; height: 26px; object-fit: contain; }
  .mem-title { font-size: 13.5px; font-weight: 700; color: #1f2937; }
  .mem-prov { font-size: 11px; color: #9ca3af; }
  .mem-date { margin-left: auto; font-size: 11.5px; color: #6b7280; }
  .mem-count {
    margin-left: auto; font-size: 11px; color: #2d6a4f; background: #dcf5e8;
    padding: 2px 8px; border-radius: 999px; flex-shrink: 0;
  }
  .mem-visit { display: flex; gap: 7px; font-size: 12.5px; line-height: 1.5; margin-bottom: 5px; }
  .mem-vdate { color: #2d6a4f; font-weight: 600; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .mem-vmemo { color: #4b5563; white-space: pre-wrap; min-width: 0; }
  .mem-memo { font-size: 12.5px; color: #4b5563; line-height: 1.5; margin-bottom: 8px; white-space: pre-wrap; }
  .mem-photos { display: grid; grid-template-columns: repeat(auto-fill, minmax(58px, 1fr)); gap: 5px; }
  .mem-photos img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 7px; cursor: pointer; }
  /* 첫 방문 안내 */
  #firstHint {
    position: absolute; left: 50%; top: 18px; transform: translateX(-50%); z-index: 6;
    background: rgba(31,41,55,.92); color: #fff; font-size: 13px; line-height: 1.5;
    padding: 10px 16px; border-radius: 12px; text-align: center; max-width: 82%;
    box-shadow: 0 4px 16px rgba(0,0,0,.18); display: none;
  }
  #firstHint b { color: #8fe3b8; }
  #firstHint .x {
    display: inline-block; margin-top: 6px; font-size: 11.5px; color: #cbd5e1;
    text-decoration: underline; cursor: pointer;
  }

  .prov-row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; padding: 2.5px 0; }
  .prov-row .name { width: 34px; color: #374151; }
  .prov-row .bar { flex: 1; height: 6px; background: #eef0f3; border-radius: 3px; overflow: hidden; }
  .prov-row .bar > div { height: 100%; background: #7fc9a4; border-radius: 3px; }
  .prov-row.done .bar > div { background: #3b9c6e; }
  .prov-row .num { width: 46px; text-align: right; color: #9ca3af; font-variant-numeric: tabular-nums; }
  .btns { display: flex; gap: 8px; margin-top: 16px; }
  .btns button {
    flex: 1; padding: 8px 0; font-size: 13px; border-radius: 8px; cursor: pointer;
    border: 1px solid #e2e8f0; background: #fff; color: #475569;
  }
  .btns button:hover { background: #f1f5f9; border-color: #cbd5e1; }
  .btns #resetBtn { color: #b91c1c; border-color: #fecaca; }
  .btns #resetBtn:hover { background: #fef2f2; }
  #tooltip {
    position: fixed; pointer-events: none; background: rgba(31,41,55,.92); color: #fff;
    font-size: 12.5px; padding: 5px 10px; border-radius: 6px; display: none; z-index: 10;
    white-space: nowrap;
  }
  #tooltip .v { color: #8fe3b8; }
  #lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,.85); display: none;
    align-items: center; justify-content: center; z-index: 20; cursor: zoom-out;
  }
  #lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 6px; }

  /* ---- 암호 입력 모달 ---- */
  #joinModal {
    position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none;
    align-items: center; justify-content: center; z-index: 30;
  }
  #joinModal .card {
    background: #fff; border-radius: 14px; padding: 26px 24px; width: 90%; max-width: 340px;
  }
  #joinModal h3 { font-size: 16px; margin-bottom: 4px; }
  #joinModal p { font-size: 12.5px; color: #6b7280; margin-bottom: 14px; }
  #joinModal input {
    width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #d1d5db;
    border-radius: 8px; margin-bottom: 8px;
  }
  #joinModal button {
    width: 100%; padding: 10px; font-size: 14px; font-weight: 600; border: none;
    border-radius: 8px; background: #3b9c6e; color: #fff; cursor: pointer;
  }

  /* ---- 모바일: 하단 탭 + 바텀시트 ---- */
  #tabbar { display: none; }
  #mapStatPill { display: none; }
  #rpClose { display: none; }
  @media (max-width: 720px) {
    aside { display: none; }
    /* 모바일 헤더: 검색을 둘째 줄 전체 폭으로 */
    #roomName { order: 1; }
    #inviteBtn { order: 2; }
    #saveBtn { order: 3; }
    #leaveBtn { order: 4; }
    #syncBadge { order: 5; }
    #searchWrap { order: 6; margin-left: 0; width: 100%; flex-basis: 100%; }
    #searchInput, #searchInput:focus { width: 100%; }
    #searchResults { width: 100%; }
    header .hbtn { font-size: 11.5px; padding: 4px 9px; }
    body.tab-stats .map-wrap { display: none; }
    body.tab-stats aside {
      display: block; width: 100%; max-height: none; flex: 1; border-left: none;
    }
    .big-stat .pct { font-size: 34px; }
    #tabbar { display: flex; background: #fff; border-top: 1px solid #e5e7eb; flex-shrink: 0; }
    #tabbar button {
      flex: 1; padding: 8px 0; padding-bottom: max(8px, env(safe-area-inset-bottom));
      font-size: 11.5px; border: none; background: none; color: #9ca3af; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    #tabbar button .icon { width: 22px; height: 22px; }
    #tabbar button.active { color: #3b9c6e; font-weight: 600; }
    #mapStatPill {
      display: block; position: absolute; top: 10px; left: 10px; z-index: 5;

// ---- API ----
// 쓰기 요청 추적 — 폴링이 방금 저장한 내용을 덮어쓰지 않게 하기 위함
let inflightWrites = 0, lastWriteAt = 0;
async function api(path, opts = {}) {
  const isWrite = !!opts.method && opts.method !== "GET";
  if (isWrite) inflightWrites++;
  opts.headers = Object.assign({ "x-token": TOKEN || "" }, opts.headers || {});
  try {
    const r = await fetch(path, opts);
    const body = await r.json().catch(() => ({}));
    if (!r.ok) throw Object.assign(new Error(body.error || r.status), { status: r.status });
    return body;
  } finally {
    if (isWrite) { inflightWrites--; lastWriteAt = Date.now(); }
  }
}
function setBadge(on, text) {
  const b = $("syncBadge");

}

async function enterRoom(id) {

  TOKEN = savedRooms[id] ? savedRooms[id].token : null;
  try {
    const s = await api(`/api/state?room=${id}`);
    startApp(s);
  } catch (e) {
    if (e.status === 403 || e.status === 404) showJoin(id);

}
function showJoin(id) {
  $("joinModal").style.display = "flex";
  $("joinPw").focus();
  $("joinBtn").onclick = async () => {
    $("joinErr").textContent = "";
    try {
      const j = await api("/api/join", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ room: id, password: $("joinPw").value })
      });
      TOKEN = j.token;
      rememberRoom(id, j.name, j.token);
      $("joinModal").style.display = "none";
      const s = await api(`/api/state?room=${id}`);
      startApp(s);
    } catch (e) {
      $("joinErr").textContent = e.message === "Failed to fetch" ? "서버 연결 실패" : e.message;

  };
  $("joinPw").onkeydown = e => { if (e.key === "Enter") $("joinBtn").click(); };

function startApp(state) {
  $("landing").style.display = "none";
  $("app").style.display = "flex";
  $("roomName").textContent = state.name;
  rememberRoom(ROOM, state.name, TOKEN);
  applyState(state);

function applyState(s) {
  visited = new Set((s.visited || []).map(String));
  photos = s.photos || {};

  paths.forEach(p => p.classList.toggle("visited", visited.has(p.dataset.code)));

async function refresh() {
  // 저장 중이거나 방금 저장했으면 건너뜀 (서버 응답이 뒤늦게 와서 로컬 편집을 지우는 것 방지)
  if (inflightWrites > 0 || Date.now() - lastWriteAt < 4000) return;
  // 입력 중이면 건너뜀 (타이핑하던 메모가 사라지지 않게)

  try {

    setBadge(true);
    updateLabels();
  } catch { setBadge(false); }
}

const emblemDataCache = {};
async function toDataURL(url) {
  if (emblemDataCache[url]) return emblemDataCache[url];
  const blob = await (await fetch(url)).blob();
  const data = await new Promise(res => {
    const fr = new FileReader();
    fr.onload = () => res(fr.result);
    fr.readAsDataURL(blob);
  });
  emblemDataCache[url] = data;
  return data;
}

async function buildMapImage() {
  const W = 800, H = 1100, HEADER = 132, DPR = 2;
  try { await document.fonts.ready; } catch {}   // 폰트 로드 후 렌더 (헤더 텍스트용)
  // 1) 지도 SVG 복제 (전국 뷰) + 방문 색 인라인 + 심벌 data URI
  const clone = svg.cloneNode(true);
  clone.setAttribute("viewBox", `0 0 ${W} ${H}`);
  clone.removeAttribute("id");
  clone.querySelectorAll(".g-munis path").forEach(p => {
    p.classList.remove("visited", "selected");
    p.setAttribute("fill", visited.has(p.dataset.code) ? "#b7e4c7" : "#ffffff");
    p.setAttribute("stroke", "#c6cfd9");
    p.setAttribute("stroke-width", "0.55");
  });
  // 라벨은 전국 뷰에서 겹치므로 제거, 마커만 다시 그림
  const cLabels = clone.querySelector(".g-labels"); if (cLabels) cLabels.remove();
  const cMarks = clone.querySelector("#visitMarks"); if (cMarks) cMarks.remove();
  // 방문 심벌을 지역 중심에 data URI로 배치
  const markG = document.createElementNS("http://www.w3.org/2000/svg", "g");
  for (const p of paths) {
    if (!visited.has(p.dataset.code)) continue;
    const bb = p.getBBox();
    const em = EMBLEMS[p.dataset.code];
    const size = Math.min(Math.min(bb.width, bb.height) * 0.9, 26);
    const cx = bb.x + bb.width / 2, cy = bb.y + bb.height / 2;
    if (em) {
      const data = await toDataURL(em);
      const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
      img.setAttributeNS("http://www.w3.org/1999/xlink", "href", data);
      img.setAttribute("href", data);
      img.setAttribute("x", cx - size / 2); img.setAttribute("y", cy - size / 2);
      img.setAttribute("width", size); img.setAttribute("height", size);
      img.setAttribute("preserveAspectRatio", "xMidYMid meet");
      markG.appendChild(img);
    }
  }
  clone.appendChild(markG);
  clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
  const svgStr = new XMLSerializer().serializeToString(clone);
  const svgImg = new Image();
  await new Promise((res, rej) => {
    svgImg.onload = res; svgImg.onerror = rej;
    svgImg.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svgStr);
  });
  // 2) 캔버스에 헤더 + 지도
  const canvas = document.createElement("canvas");
  canvas.width = W * DPR; canvas.height = (H + HEADER) * DPR;
  const ctx = canvas.getContext("2d");
  ctx.scale(DPR, DPR);
  ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, W, H + HEADER);
  // 헤더 텍스트
  const n = visited.size, pct = Math.round(n / paths.length * 1000) / 10;
  ctx.fillStyle = "#1f2937";
  ctx.font = "700 34px 'Pretendard Variable',Pretendard,'Pretendard Variable',Pretendard,'Malgun Gothic',sans-serif";
  ctx.textBaseline = "alphabetic";
  ctx.fillText($("roomName").textContent || "나의 여행 지도", 40, 58);
  ctx.fillStyle = "#3b9c6e";
  ctx.font = "700 26px 'Pretendard Variable',Pretendard,'Malgun Gothic',sans-serif";
  const pctStr = `${pct}%`;
  ctx.fillText(pctStr, 40, 100);
  const pctW = ctx.measureText(pctStr).width;
  ctx.fillStyle = "#6b7280";
  ctx.font = "400 18px 'Pretendard Variable',Pretendard,'Malgun Gothic',sans-serif";
  ctx.fillText(`${n} / ${paths.length} 시·군·구 방문`, 40 + pctW + 12, 100);
  ctx.textAlign = "right";
  ctx.fillStyle = "#9ca3af";
  ctx.font = "400 15px 'Pretendard Variable',Pretendard,'Malgun Gothic',sans-serif";
  ctx.fillText("map-for-memory", W - 40, 100);
  ctx.textAlign = "left";
  ctx.strokeStyle = "#eef0f3"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(40, HEADER - 12); ctx.lineTo(W - 40, HEADER - 12); ctx.stroke();
  ctx.drawImage(svgImg, 0, HEADER, W, H);
  return await new Promise(res => canvas.toBlob(res, "image/png"));
}

// ---- 탭 = 지역 선택만 (방문 표시는 패널의 버튼으로) ----
// 탭 위치의 지역을 찾되, 정확히 못 맞히면 화면상 가장 가까운 지역으로 스냅 (작은 구 대응)
function regionAt(clientX, clientY) {
  const el = document.elementFromPoint(clientX, clientY);
  if (el && el.parentElement && el.parentElement.classList.contains("g-munis") && el.dataset.code)
    return el.dataset.code;
  const r = svg.getBoundingClientRect();
  if (!r.width) return null;
  const px = vb.x + (clientX - r.left) / r.width * vb.w;
  const py = vb.y + (clientY - r.top) / r.height * vb.h;
  let best = null, bestD = Infinity;
  for (const p of paths) {
    const bb = regionBBox(p.dataset.code);
    if (!bb || !bb.width) continue;
    const cx = bb.x + bb.width / 2, cy = bb.y + bb.height / 2;
    const d = Math.hypot(cx - px, cy - py);
    if (d < bestD) { bestD = d; best = p; }
  }
  const tolSvg = 26 / (r.width / vb.w);   // 화면상 26px 이내면 스냅
  return best && bestD < tolSvg ? best.dataset.code : null;
}
function handleTap(clientX, clientY) {
  const code = regionAt(clientX, clientY);
  if (code) select(code);
}
function toggleVisited(code) {
  const p = paths.find(x => x.dataset.code === code);
  const on = !visited.has(code);
  if (on) { visited.add(code); p.classList.add("visited"); }
  else { visited.delete(code); p.classList.remove("visited"); }
  render(); updateLabels();
  api("/api/visited", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ room: ROOM, code, on })
  }).then(() => setBadge(true)).catch(() => setBadge(false));
}

// ---- 방문 기록(여러 번 방문 지원) ----
// 저장 형태: notes[code] = { visits: [{start, end, memo}] }
// 예전 형태({date, memo})는 읽을 때 자동 변환
function newVid() { return "v" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

// ---- 사진을 다른 방문으로 옮기기 ----
function openMovePicker(code, url) {
  const cur = ((photos[code] || []).find(p => p.url === url) || {}).vid || "";
  const vs = getVisits(code);
  const rows = vs.map(v => {
    const d = visitDateText(v) || "날짜 없는 방문";
    const memo = v.memo ? `<span class="mv-memo">${escapeHtml(v.memo.slice(0, 30))}</span>` : "";
    return `<button data-vid="${v.id}" class="${v.id === cur ? "cur" : ""}">${d}${memo}</button>`;
  });
  rows.push(`<button data-vid="" class="${cur ? "" : "cur"}">방문일 미지정</button>`);
  if (!vs.length) {
    rows.unshift(`<div class="mv-memo" style="margin-bottom:8px">먼저 '+ 방문 추가'로 방문 기록을 만들어 주세요.</div>`);
  }
  $("moveList").innerHTML = rows.join("");
  $("moveList").querySelectorAll("button[data-vid]").forEach(b => {
    b.onclick = () => movePhoto(code, url, b.dataset.vid);
  });
  $("movePicker").classList.add("show");
}
$("moveCancel").onclick = () => $("movePicker").classList.remove("show");
$("movePicker").onclick = (e) => { if (e.target.id === "movePicker") $("movePicker").classList.remove("show"); };
async function movePhoto(code, url, vid) {
  $("movePicker").classList.remove("show");
  try {
    await api(`/api/photo?room=${ROOM}&code=${code}&vid=${encodeURIComponent(vid)}`, {
      method: "PUT", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url })
    });
    const p = (photos[code] || []).find(x => x.url === url);
    if (p) p.vid = vid;
    renderPanel(); renderFeed();
    setBadge(true);
  } catch { alert("옮기지 못했어요. 다시 시도해 주세요."); setBadge(false); }
}
function normVisits(raw) {
  if (!raw) return [];
  if (Array.isArray(raw.visits)) return raw.visits.map(v => ({
    id: v.id || newVid(), start: v.start || "", end: v.end || "", memo: v.memo || ""
  }));
  if (raw.date || raw.memo) return [{ id: newVid(), start: raw.date || "", end: "", memo: raw.memo || "" }];
  return [];
}
function getVisits(code) {
  const raw = notes[code];
  const vs = normVisits(raw);
  // 예전 데이터엔 방문 ID가 없어 매번 새로 생기므로, 한 번 부여하고 고정한다
  // (고정하지 않으면 사진-방문 연결이 계속 어긋남)
  const missing = vs.length && (!raw || !Array.isArray(raw.visits) || raw.visits.some(v => !v.id));
  if (missing) {
    notes[code] = { visits: vs };
    if (ROOM) {
      api("/api/note", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ room: ROOM, code, visits: vs })
      }).catch(() => {});
    }
  }
  return vs;
}
// 방문별 사진 / 방문일 미지정 사진
function photosOfVisit(code, vid) {
  return (photos[code] || []).filter(p => (p.vid || "") === vid);
}
function unassignedPhotos(code) {
  const ids = new Set(getVisits(code).map(v => v.id));
  return (photos[code] || []).filter(p => !p.vid || !ids.has(p.vid));
}
function photoGridHtml(list) {
  if (!list.length) return "";
  return `<div class="v-photos">${list.map(p =>
    `<div class="ph"><img src="${p.url}" alt="${escapeHtml(p.name || "")}" loading="lazy" data-full="${p.url}">` +
    `<button class="del" data-url="${p.url}" title="삭제">✕</button>` +
    `<button class="mv" data-url="${p.url}" title="다른 방문으로 옮기기">이동</button></div>`).join("")}</div>`;
}
// 그리드 안의 사진 클릭(확대)·삭제 연결
function wirePhotoGrid(root, code) {
  root.querySelectorAll("img[data-full]").forEach(img => {

  });

        if (!photos[code].length) delete photos[code];
        renderPanel(); renderFeed();
      } catch { alert("삭제 실패"); }
    };

}

function renderVisits() {
  const list = $("visitList");
  const visits = getVisits(selected);
  list.innerHTML = visits.map((v, i) => `
    <div class="visit-card" data-i="${i}">
      <div class="visit-top">
        <span class="dlabel">📅 방문일 <em>(하루면 시작일만)</em></span>
        <button class="visit-del" title="이 방문 기록 삭제">✕</button>
      </div>
      <div class="visit-dates">
        <input type="date" class="v-start" value="${v.start}" max="2999-12-31" aria-label="시작일">
        <span class="tilde">~</span>
        <input type="date" class="v-end" value="${v.end}" max="2999-12-31" aria-label="종료일(선택)">
      </div>
      <textarea rows="2" maxlength="500" class="v-memo" placeholder="이때의 기억을 남겨보세요">${escapeHtml(v.memo)}</textarea>
      ${photoGridHtml(photosOfVisit(selected, v.id))}
      <button class="v-addphoto" data-vid="${v.id}">📷 이 방문의 사진 추가</button>
    </div>`).join("");
  list.querySelectorAll(".visit-card").forEach(card => {
    const i = +card.dataset.i;
    const start = card.querySelector(".v-start");
    const end = card.querySelector(".v-end");
    const memo = card.querySelector(".v-memo");
    const commit = () => {
      const vs = getVisits(selected);
      if (!vs[i]) return;
      // 종료일이 시작일보다 빠르면 자동 교정
      let s = start.value, e = end.value;
      if (s && e && e < s) { e = s; end.value = e; }
      vs[i] = { id: vs[i].id, start: s, end: e, memo: memo.value };   // id 유지 (사진 연결)
      saveVisits(selected, vs);
    };
    start.onchange = commit;
    end.onchange = commit;
    let tmr = null;
    memo.oninput = () => { clearTimeout(tmr); tmr = setTimeout(commit, 600); };
    memo.onblur = () => { clearTimeout(tmr); commit(); };
    card.querySelector(".visit-del").onclick = async () => {
      const code = selected;
      const vs = getVisits(code);
      const gone = vs[i];
      const ph = gone ? photosOfVisit(code, gone.id) : [];
      if (ph.length && !confirm(`이 방문 기록과 사진 ${ph.length}장이 함께 삭제됩니다. 계속할까요?`)) return;
      for (const p of ph) {
        try {
          await api(`/api/photo?room=${ROOM}&code=${code}`, {
            method: "DELETE", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url: p.url })
          });
        } catch {}
        photos[code] = (photos[code] || []).filter(x => x.url !== p.url);
      }
      if (photos[code] && !photos[code].length) delete photos[code];
      vs.splice(i, 1);
      saveVisits(code, vs);
      renderPanel();
    };
    card.querySelector(".v-addphoto").onclick = () => {
      pendingVid = card.querySelector(".v-addphoto").dataset.vid;
      $("photoInput").click();
    };
    wirePhotoGrid(card, selected);
  });
}
function saveVisits(code, visits) {
  // 사용자가 명시적으로 추가한 방문은 비어 있어도 유지 (사진·날짜를 나중에 채울 수 있게)
  const clean = visits.filter(v => v.id);
  if (clean.length) notes[code] = { visits: clean };
  else delete notes[code];
  // 방문 기록을 남겼는데 아직 미방문이면 자동으로 방문 처리
  if (clean.length && !visited.has(code)) toggleVisited(code);
  renderFeed();
  api("/api/note", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ room: ROOM, code, visits: clean })
  }).then(() => setBadge(true)).catch(() => setBadge(false));
}
let pendingVid = "";   // 어느 방문 기록에 사진을 올릴지
$("addVisitBtn").onclick = () => {
  if (!selected) return;
  const vs = getVisits(selected);
  vs.push({ id: newVid(), start: "", end: "", memo: "" });
  saveVisits(selected, vs);   // 바로 저장해야 동기화에 지워지지 않음
  renderVisits();
  const last = $("visitList").querySelector(".visit-card:last-child .v-start");
  if (last) last.focus();
};
// 날짜(기간) 표시용 문자열
function visitDateText(v) {
  const f = d => d.replace(/-/g, ".");
  if (v.start && v.end && v.end !== v.start) {
    // 같은 해·달이면 끝 날짜는 일만 (2026.07.15~16)
    const [ys, ms] = v.start.split("-"), [ye, me, de] = v.end.split("-");
    if (ys === ye && ms === me) return `${f(v.start)}~${de}`;
    if (ys === ye) return `${f(v.start)}~${me}.${de}`;
    return `${f(v.start)}~${f(v.end)}`;
  }
  return f(v.start || v.end || "");
}

// 여행 앨범 피드 (기록 탭): 방문 날짜 최신순, 사진·메모 있는 곳 위주
function renderFeed() {
  const feed = $("memoryFeed");
  if (!feed) return;
  const entries = [];
  const codes = new Set([...Object.keys(notes), ...Object.keys(photos)]);
  codes.forEach(code => {
    if (!nameByCode[code]) return;   // 지도에 없는 코드는 건너뜀
    const visits = getVisits(code).filter(v => v.start || v.end || v.memo);
    const ph = photos[code] || [];
    if (!visits.length && ph.length === 0) return;
    // 최신 방문이 위로
    visits.sort((a, b) => (b.start || b.end || "0").localeCompare(a.start || a.end || "0"));
    entries.push({ code, visits, photos: ph, latest: (visits[0] && (visits[0].start || visits[0].end)) || "0" });
  });
  entries.sort((a, b) => b.latest.localeCompare(a.latest));
  feed.innerHTML = entries.map(e => {
    const emblem = EMBLEMS[e.code];
    const prov = PROV[groupOf(e.code)] || "";
    const name = nameByCode[e.code] || "";
    const countHtml = e.visits.length > 1
      ? `<span class="mem-count">${e.visits.length}번 방문</span>` : "";
    const visitsHtml = e.visits.map(v => {
      const d = visitDateText(v);
      const vp = e.photos.filter(p => (p.vid || "") === v.id);
      return `<div class="mem-visit">
        ${d ? `<span class="mem-vdate">${d}</span>` : ""}
        ${v.memo ? `<span class="mem-vmemo">${escapeHtml(v.memo)}</span>` : ""}
      </div>` + (vp.length
        ? `<div class="mem-photos">${vp.map(p =>
            `<img src="${p.url}" loading="lazy" data-full="${p.url}">`).join("")}</div>`
        : "");
    }).join("");
    // 방문에 속하지 않은 사진은 맨 아래
    const vids = new Set(e.visits.map(v => v.id));
    const rest = e.photos.filter(p => !p.vid || !vids.has(p.vid));
    const photosHtml = rest.length
      ? `<div class="mem-photos">${rest.map(p =>
          `<img src="${p.url}" loading="lazy" data-full="${p.url}">`).join("")}</div>`
      : "";
    return `<div class="mem-card" data-code="${e.code}">
      <div class="mem-head">
        ${emblem ? `<img src="${emblem}" alt="">` : ""}
        <div><div class="mem-title">${name}</div><div class="mem-prov">${prov}</div></div>
        ${countHtml}
      </div>${visitsHtml}${photosHtml}</div>`;
  }).join("");
  feed.querySelectorAll("img[data-full]").forEach(img => {
    img.onclick = (ev) => {
      ev.stopPropagation();   // 사진 클릭은 확대 (지역 이동 아님)
      $("lightbox").style.display = "flex";
      $("lightbox").querySelector("img").src = img.dataset.full;
    };
  });
  feed.querySelectorAll(".mem-card").forEach(card => {
    card.onclick = () => focusRegion(card.dataset.code);
  });
}
function escapeHtml(s) {
  return s.replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

// 첫 방문 안내: 방이 비어 있고, 이 방에서 아직 안내를 닫지 않았으면 표시
function maybeShowFirstHint() {

// 사진 압축: 긴 변 1600px, JPEG 품질 0.85 (Vercel 요청 크기 제한 대응 + 저장 용량 절약)
async function compressImage(file) {
  if (!/^image\//.test(file.type)) return { blob: file, name: file.name };
  const img = await createImageBitmap(file).catch(() => null);
  if (!img) return { blob: file, name: file.name };
  const max = 1600;
  const k = Math.min(1, max / Math.max(img.width, img.height));
  if (k === 1 && file.size < 2 * 1024 * 1024) return { blob: file, name: file.name };
  const c = document.createElement("canvas");
  c.width = Math.round(img.width * k);
  c.height = Math.round(img.height * k);
  c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
  const blob = await new Promise(r => c.toBlob(r, "image/jpeg", 0.85));
  if (!blob) return { blob: file, name: file.name };
  return { blob, name: file.name.replace(/\.\w+$/, "") + ".jpg" };
}
$("photoInput").addEventListener("change", async e => {
  if (!selected) { e.target.value = ""; return; }
  const code = selected, vid = pendingVid;
  const files = [...e.target.files];
  e.target.value = "";
  for (let i = 0; i < files.length; i++) {
    $("uploadMsg").textContent = `업로드 중… (${i + 1}/${files.length})`;
    try {
      const { blob, name } = await compressImage(files[i]);
      const j = await api(`/api/photo?room=${ROOM}&code=${code}&vid=${encodeURIComponent(vid)}`, {
        method: "POST",
        headers: { "Content-Type": "application/octet-stream", "X-Filename": encodeURIComponent(name) },
        body: blob
      });
      (photos[code] = photos[code] || []).push({ url: j.url, name: j.name, vid: j.vid || vid });
    } catch { alert(`${files[i].name} 업로드 실패`); }
  }
  $("uploadMsg").textContent = "";
  // 사진만 올린 방문 기록도 서버에 남도록 저장
  if (vid) saveVisits(code, getVisits(code));
  else if ((photos[code] || []).length && !visited.has(code)) toggleVisited(code);
  renderPanel(); renderFeed();
});
$("lightbox").onclick = () => { $("lightbox").style.display = "none"; };

// ---- 툴팁 ----
paths.forEach(p => {
  p.addEventListener("pointermove", e => {
    const code = p.dataset.code;
    const prov = PROV[groupOf(code)] || "";
    const mark = visited.has(code) ? ' <span class="v">✓ 방문</span>' : "";
    const ph = (photos[code] || []).length;
    tooltip.innerHTML = `${prov} ${p.dataset.name}${mark}${ph ? ` · 사진 ${ph}` : ""}`;
    tooltip.style.display = "block";
    tooltip.style.left = (e.clientX + 14) + "px";
    tooltip.style.top = (e.clientY + 14) + "px";
  });
  p.addEventListener("pointerleave", () => { tooltip.style.display = "none"; });
});

// ---- 통계 (현재 보고 있는 나라 기준) ----
let provCodes = [], provTotals = {};
function buildProvList() {
  provTotals = {};
  paths.forEach(p => {
    const pc = groupOf(p.dataset.code);
    provTotals[pc] = (provTotals[pc] || 0) + 1;
  });
  provCodes = Object.keys(provTotals).sort();
  $("total").textContent = paths.length;
  $("statsHead").textContent = COUNTRY === "jp" ? "지방별 달성률" : "시·도별 달성률";
  $("unitLabel").textContent = COUNTRY === "jp" ? "지역" : "시·군·구";
  $("provList").innerHTML = provCodes.map(pc =>
    `<div class="prov-row" id="prov-${pc}"><span class="name">${PROV[pc] || ""}</span>` +
    `<div class="bar"><div></div></div><span class="num"></span></div>`).join("");
}
function render() {
  // 방문 수는 현재 나라 기준으로만 집계
  let n = 0;
  visited.forEach(c => { if (countryOfCode(c) === COUNTRY) n++; });
  $("cnt").textContent = n;
  const pct = paths.length ? n / paths.length * 100 : 0;
  const pctText = (pct > 0 && pct < 10 ? pct.toFixed(1) : Math.round(pct)) + "%";
  $("pct").textContent = pctText;
  $("totalBar").style.width = pct + "%";
  $("mapStatPill").innerHTML = `<b>${n}</b> / ${paths.length} · ${pctText}`;
  const pv = {};
  visited.forEach(c => { const pc = groupOf(c); pv[pc] = (pv[pc] || 0) + 1; });
  provCodes.forEach(pc => {
    const row = $("prov-" + pc);
    if (!row) return;
    const v = pv[pc] || 0, t = provTotals[pc] || 0;
    row.querySelector(".bar > div").style.width = (t ? v / t * 100 : 0) + "%";
    row.querySelector(".num").textContent = `${v}/${t}`;
    row.classList.toggle("done", v === t && t > 0);
  });
}
buildProvList();

// ---- 확대/이동 + 라벨 표시 ----
function applyVB() {
  svg.setAttribute("viewBox", `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
  updateLabels();
}
// 나라 전환
function setCountry(cc) {
  if (!MAPS[cc] || cc === COUNTRY) return;
  bindMap(cc);
  Object.values(MAPS).forEach(m => m.svg.classList.toggle("hidden", m.cc !== cc));
  document.querySelectorAll("#countrySwitch button").forEach(b =>
    b.classList.toggle("active", b.dataset.country === cc));
  // 선택 해제 후 활성 지도 기준으로 다시 그림
  selected = null;
  $("rpHint").style.display = "";
  $("rpBody").style.display = "none";
  if (mq.matches) regionPanelEl.classList.remove("open");
  buildProvList();
  render(); applyVB();
}
document.querySelectorAll("#countrySwitch button").forEach(b => {
  b.onclick = () => setCountry(b.dataset.country);
});
function regionBBox(code) {
  // 숨겨진 상태(getBBox=0)는 캐시하지 않아 나중에 다시 정확히 측정
  if ((!bboxCache[code] || !bboxCache[code].width) && pathByCode[code]) {
    const bb = pathByCode[code].getBBox();
    if (bb.width) bboxCache[code] = bb;
    else return bb;
  }
  return bboxCache[code];
}
// 앨범 카드 → 해당 지역으로 지도 이동 + 선택
function focusRegion(code) {
  setTab("map");
  setCountry(countryOfCode(code));   // 다른 나라 지역이면 지도부터 전환
  const bb = regionBBox(code);
  if (bb && bb.width) {
    const cx = bb.x + bb.width / 2, cy = bb.y + bb.height / 2;
    const ar = home.w / home.h;
    // 지역이 화면의 약 45%를 차지하도록 여백 포함 크기 계산
    let w = Math.max(bb.width, bb.height * ar) / 0.45;
    w = Math.min(Math.max(w, home.w / 18), home.w);
    let h = w / ar;
    vb = { x: cx - w / 2, y: cy - h / 2, w, h };
    applyVB();
  }
  select(code);
}

// ---- 지역 검색 (한국·일본 모두) ----
const searchIndex = Object.values(MAPS).flatMap(m => m.paths.map(p => ({
  code: p.dataset.code,
  name: p.dataset.name,
  prov: PROV[groupOf(p.dataset.code)] || "",
  cc: m.cc
})));
const searchInput = $("searchInput");
const searchResults = $("searchResults");
let srActive = -1, srItems = [];

function runSearch(q) {
  q = q.trim();
  if (!q) { closeSearch(); return; }
  const scored = [];
  for (const r of searchIndex) {
    const full = r.prov + " " + r.name;
    let score = -1;
    if (r.name.startsWith(q)) score = 0;
    else if (r.name.includes(q)) score = 1;
    else if (full.includes(q)) score = 2;
    if (score >= 0) scored.push({ ...r, score });
  }
  scored.sort((a, b) => (a.cc === COUNTRY ? 0 : 1) - (b.cc === COUNTRY ? 0 : 1)
    || a.score - b.score || a.name.localeCompare(b.name));
  srItems = scored.slice(0, 12);
  srActive = srItems.length ? 0 : -1;
  if (!srItems.length) {
    searchResults.innerHTML = `<div class="sr-empty">"${escapeHtml(q)}" 검색 결과가 없어요</div>`;
  } else {
    searchResults.innerHTML = srItems.map((r, i) => {
      const em = EMBLEMS[r.code];
      const vis = visited.has(r.code) ? `<span class="sr-visited">✓</span>` : "";
      return `<div class="sr-item${i === srActive ? " active" : ""}" data-code="${r.code}" data-i="${i}">
        ${em ? `<img src="${em}" alt="">` : ""}
        <span>${escapeHtml(r.name)}</span> ${vis}
        <span class="sr-prov">${r.cc === "jp" ? "🇯🇵 " : ""}${r.prov}</span>
      </div>`;
    }).join("");
    searchResults.querySelectorAll(".sr-item").forEach(el => {
      el.onmousedown = (e) => { e.preventDefault(); pickSearch(el.dataset.code); };
      el.onmouseenter = () => { srActive = +el.dataset.i; highlightSR(); };
    });
  }
  searchResults.classList.add("show");
}
function highlightSR() {
  searchResults.querySelectorAll(".sr-item").forEach((el, i) =>
    el.classList.toggle("active", i === srActive));
}
function pickSearch(code) {
  focusRegion(code);
  searchInput.value = "";
  closeSearch();
  searchInput.blur();
}
function closeSearch() {
  searchResults.classList.remove("show");
  searchResults.innerHTML = "";
  srItems = []; srActive = -1;
}
searchInput.addEventListener("input", () => runSearch(searchInput.value));
searchInput.addEventListener("focus", () => { if (searchInput.value.trim()) runSearch(searchInput.value); });
searchInput.addEventListener("keydown", (e) => {
  if (!srItems.length && e.key !== "Escape") return;
  if (e.key === "ArrowDown") { e.preventDefault(); srActive = Math.min(srActive + 1, srItems.length - 1); highlightSR(); }
  else if (e.key === "ArrowUp") { e.preventDefault(); srActive = Math.max(srActive - 1, 0); highlightSR(); }
  else if (e.key === "Enter") { e.preventDefault(); if (srItems[srActive]) pickSearch(srItems[srActive].code); }
  else if (e.key === "Escape") { closeSearch(); searchInput.blur(); }
});
document.addEventListener("click", (e) => {
  if (!$("searchWrap").contains(e.target)) closeSearch();
});

function updateLabels() {
  const rect = svg.getBoundingClientRect();
  if (!rect.width) return;
  const pxPerUnit = rect.width / vb.w;
  svg.querySelector(".g-labels").style.fontSize = (11 / pxPerUnit) + "px";
  provLabelsG.style.fontSize = (13 / pxPerUnit) + "px";
  const showMuni = vb.w <= MAPS[COUNTRY].labelAt;
  provLabelsG.style.display = showMuni ? "none" : "";

  // --- 어떤 시·군·구 이름을 보일지: 큰 지역 우선 + 겹치면 숨김 ---
  const labelShownMap = {};
  if (showMuni) {
    const placed = [];
    const order = muniTexts.slice().sort((a, b) =>
      (parseFloat(b.dataset.w) * parseFloat(b.dataset.h || b.dataset.w)) -
      (parseFloat(a.dataset.w) * parseFloat(a.dataset.h || a.dataset.w)));
    for (const t of order) {
      const nameLen = t.textContent.length;
      const fits = parseFloat(t.dataset.w) * pxPerUnit > nameLen * 11 + 8;
      if (!fits) { labelShownMap[t.dataset.code] = false; continue; }
      const cxU = +t.getAttribute("x"), cyU = +t.getAttribute("y");
      const sx = rect.left + (cxU - vb.x) / vb.w * rect.width;
      const sy = rect.top + (cyU - vb.y) / vb.h * rect.height;
      const halfW = nameLen * 11 / 2 + 4, halfH = 9;
      const box = { l: sx - halfW, t: sy - halfH, r: sx + halfW, b: sy + halfH };
      // 선택한 지역 이름은 겹쳐도 항상 표시 (어느 지역인지 헷갈리지 않게)
      const hit = t.dataset.code !== selected &&
        placed.some(p => !(box.r < p.l || box.l > p.r || box.b < p.t || box.t > p.b));
      if (hit) { labelShownMap[t.dataset.code] = false; }
      else { labelShownMap[t.dataset.code] = true; placed.push(box); }
    }
  }
  const marks = [];
  muniTexts.forEach(t => {
    const labelShown = showMuni && !!labelShownMap[t.dataset.code];
    t.style.display = labelShown ? "" : "none";
    if (labelShown) t.classList.toggle("on-visited", visited.has(t.dataset.code));
    if (!visited.has(t.dataset.code)) return;
    const x = +t.getAttribute("x");
    const y = +t.getAttribute("y");
    const emblem = EMBLEMS[t.dataset.code];
    if (emblem) {
      // 지자체 심벌을 지역 안에 반투명하게 채움. 지역 크기에 맞추되 너무 작아지지 않게
      const w = parseFloat(t.dataset.w);
      const h = parseFloat(t.dataset.h) || w;
      // 심벌이 지역 경계를 넘지 않도록 지역 크기 안에 가둔다.
      const fontSvg = 11 / pxPerUnit;
      const availW = w * 0.86;
      // 라벨이 보이면 심벌은 이름 위쪽 공간에만 (지역 위 경계 ~ 라벨 위끝),
      // 안 보이면 지역 중심에 크게.
      const availH = labelShown
        ? Math.max(0, h / 2 - fontSvg * 0.6 - 2 / pxPerUnit)
        : h * 0.82;
      let size = Math.min(w, h) * 0.6;
      size = Math.min(size, availW, availH, 96 / pxPerUnit);
      size = Math.max(size, 12 / pxPerUnit);          // 너무 작지 않게
      size = Math.min(size, availW, availH);          // 단, 지역을 넘지는 않게 최종 캡
      const half = size / 2;
      let cx = x;
      let cy = labelShown ? (y - fontSvg * 0.5 - 2 / pxPerUnit - half) : y;
      // 심벌 상자를 지역 bbox 안으로 강제 클램프 (경계 밖으로 삐져나오지 않게)
      const bb = regionBBox(t.dataset.code);
      if (bb) {
        if (bb.width > size) cx = Math.min(Math.max(cx, bb.x + half), bb.x + bb.width - half);
        else cx = bb.x + bb.width / 2;
        if (bb.height > size) cy = Math.min(Math.max(cy, bb.y + half), bb.y + bb.height - half);
        else cy = bb.y + bb.height / 2;
      }
      marks.push(
        `<image href="${emblem}" x="${cx - half}" y="${cy - half}" width="${size}" height="${size}"` +
        ` opacity="0.72" preserveAspectRatio="xMidYMid meet"/>`);
    } else {
      // 휘장이 없는 지역은 체크 핀으로 (줌 무관 고정 크기)
      const s = 1 / pxPerUnit;
      const py = y - (labelShown ? 9 / pxPerUnit : 0);
      marks.push(
        `<g transform="translate(${x} ${py}) scale(${s})">` +
        `<path d="M0 0C-4.5-6-8-9.2-8-13a8 8 0 1 1 16 0c0 3.8-3.5 7-8 13Z"` +
        ` fill="#2d6a4f" stroke="#ffffff" stroke-width="1.5"/>` +
        `<path d="M-3.2-14.5-0.8-12 3.4-16.2"` +
        ` stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>` +
        `</g>`);
    }
  });
  marksG.innerHTML = marks.join("");
}
function zoomAt(cx, cy, factor) {
  const newW = Math.min(home.w * 2, Math.max(home.w / 20, vb.w * factor));
  const k = newW / vb.w;
  vb.x = cx - (cx - vb.x) * k;
  vb.y = cy - (cy - vb.y) * k;
  vb.w = newW; vb.h = vb.h * k;
  applyVB();
}
function clientToSvg(e) {
  const r = svg.getBoundingClientRect();
  return [vb.x + (e.clientX - r.left) / r.width * vb.w,
          vb.y + (e.clientY - r.top) / r.height * vb.h];
}
MAPSVGS.forEach(el => el.addEventListener("wheel", e => {
  e.preventDefault();
  const [cx, cy] = clientToSvg(e);
  zoomAt(cx, cy, e.deltaY > 0 ? 1.2 : 1 / 1.2);
}, { passive: false }));
$("zoomIn").onclick = () => zoomAt(vb.x + vb.w / 2, vb.y + vb.h / 2, 1 / 1.4);
$("zoomOut").onclick = () => zoomAt(vb.x + vb.w / 2, vb.y + vb.h / 2, 1.4);
$("zoomReset").onclick = () => { vb = { ...home }; applyVB(); };
window.addEventListener("resize", updateLabels);

const pointers = new Map();
let pinchDist = 0;
let tapStart = null, tapMoved = false;   // 탭 판정용
MAPSVGS.forEach(el => el.addEventListener("pointerdown", e => {
  pointers.set(e.pointerId, e);
  if (pointers.size === 1) { tapStart = [e.clientX, e.clientY]; tapMoved = false; }
  else { tapStart = null; }   // 멀티터치면 탭 아님
  if (pointers.size === 2) {
    const [a, b] = [...pointers.values()];
    pinchDist = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
  }
  el.setPointerCapture(e.pointerId);
}));
MAPSVGS.forEach(el => el.addEventListener("pointermove", e => {
  if (!pointers.has(e.pointerId)) return;
  const prev = pointers.get(e.pointerId);
  pointers.set(e.pointerId, e);
  const r = svg.getBoundingClientRect();
  if (pointers.size === 1) {
    if (tapStart && Math.hypot(e.clientX - tapStart[0], e.clientY - tapStart[1]) > 8) tapMoved = true;
    const dx = (e.clientX - prev.clientX) / r.width * vb.w;
    const dy = (e.clientY - prev.clientY) / r.height * vb.h;
    if (dx || dy) { el.classList.add("dragging"); vb.x -= dx; vb.y -= dy; applyVB(); }
  } else if (pointers.size === 2) {
    const [a, b] = [...pointers.values()];
    const d = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
    if (pinchDist > 0 && d > 0) {
      const mx = (a.clientX + b.clientX) / 2, my = (a.clientY + b.clientY) / 2;
      const cx = vb.x + (mx - r.left) / r.width * vb.w;
      const cy = vb.y + (my - r.top) / r.height * vb.h;
      zoomAt(cx, cy, pinchDist / d);
      pinchDist = d;
    }
  }
}));
["pointerup","pointercancel"].forEach(ev => MAPSVGS.forEach(el => el.addEventListener(ev, e => {
  // 단일 탭(거의 안 움직임)이면 지역 선택
  if (ev === "pointerup" && tapStart && !tapMoved && pointers.size === 1) {
    handleTap(e.clientX, e.clientY);
  }
  pointers.delete(e.pointerId);
  if (pointers.size === 0) { el.classList.remove("dragging"); tapStart = null; }
  pinchDist = 0;
})));

// ---- 내보내기 / 가져오기 / 초기화 ----
// 전체 초기화 — 지도 비밀번호 확인 후 실행 (서버에서 검증)
$("resetBtn").onclick = () => {
  $("resetDesc").innerHTML =
    `방문 표시 <b>${visited.size}곳</b>이 모두 지워집니다.<br>` +
    `사진·메모는 그대로 남습니다.<br>함께 쓰는 지도라면 모두에게 적용됩니다.`;
  $("resetPw").value = "";
  $("resetErr").textContent = "";
  $("resetModal").classList.add("show");
  $("resetPw").focus();
};
$("resetCancel").onclick = () => $("resetModal").classList.remove("show");
$("resetModal").onclick = (e) => { if (e.target.id === "resetModal") $("resetModal").classList.remove("show"); };
$("resetPw").onkeydown = (e) => { if (e.key === "Enter") $("resetConfirm").click(); };
$("resetConfirm").onclick = async () => {
  const pw = $("resetPw").value;
  if (!pw) { $("resetErr").textContent = "비밀번호를 입력해 주세요."; return; }
  $("resetConfirm").disabled = true;
  $("resetErr").textContent = "";
  try {
    await api("/api/reset", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ room: ROOM, password: pw })
    });
    visited.clear();
    paths.forEach(p => p.classList.remove("visited"));
    render(); updateLabels();
    if (selected) renderPanel();
    setBadge(true);
    $("resetModal").classList.remove("show");
  } catch (e) {
    $("resetErr").textContent = e.message === "Failed to fetch" ? "서버 연결 실패" : (e.message || "초기화 실패");
  } finally {
    $("resetConfirm").disabled = false;
  }
};

// ---- 시작 ----
const roomParam = new URLSearchParams(location.search).get("room");
if (roomParam && /^[a-z0-9]{6,12}$/.test(roomParam)) enterRoom(roomParam);
else showLanding();
</script>
